<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO ALMA - Full Screen Adaptive</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: system-ui, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 1vh; }

        .header { 
            height: 8vh; background: #111; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 3vw; border-bottom: 0.4vh solid #ff6600; border-radius: 1.5vh;
            margin-bottom: 1vh; flex-shrink: 0;
        }
        .logo-main { font-size: 4.2vh; color: #ff6600; font-weight: 900; letter-spacing: 2px; }
        #time { font-size: 4.5vh; color: #00ffcc; font-weight: 900; }
        #training-info { font-size: 2.5vh; color: #ff6600; font-weight: bold; }

        /* מיכל ראשי שדוחף את הכרטיסיות למלא את כל הגובה */
        #container { 
            flex-grow: 1;
            display: flex; 
            flex-direction: column;
            gap: 1.5vh;
        }

        .row {
            display: flex;
            flex: 1; /* גורם לשורה למלא את כל הגובה הזמין */
            gap: 1.5vw;
            justify-content: center;
        }

        .card { 
            background: #161616; border: 0.2vh solid #333; border-radius: 2vh; 
            display: flex; flex-direction: column; 
            flex: 1; /* גורם לכרטיסייה למלא את כל הרוחב הזמין בשורה */
            padding: 2vh; overflow: hidden;
        }

        .name { 
            font-size: 4.5vh; color: #ff6600; text-align: center; 
            border-bottom: 0.2vh solid #444; margin-bottom: 1vh; font-weight: 900;
            flex-shrink: 0; padding-bottom: 0.5vh;
        }

        .ex-list { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            min-height: 0; 
        }

        .ex-row { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #222; 
            flex: 1; 
            min-height: 0; 
        }

        .ex-text { 
            font-size: clamp(1.8vh, 2.8vh, 4.5vh); 
            font-weight: 600; 
            overflow: hidden; 
            white-space: nowrap; 
            text-overflow: ellipsis; 
        }

        .reps { 
            color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); 
            padding: 0.5vh 1.5vw; border-radius: 1vh; border: 0.15vh solid #00ffcc; 
            font-size: clamp(1.6vh, 2.4vh, 3.8vh); 
            min-width: 7vw; text-align: center; 
        }
        
        .weight { color: #ff9f43; font-weight: bold; font-size: 0.85em; margin-right: 0.8vw; }
        
        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 6vh; color: #444; font-weight: 900; }
    </style>
</head>
<body>

    <div class="header">
        <div id="training-info">מזהה אימון...</div>
        <div class="logo-main">STUDIO ALMA</div>
        <div id="time">00:00:00</div>
    </div>

    <div id="container"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function parseSheetTime(str) {
            const match = str.match(/(\d{1,2}):(\d{2})/);
            if (!match) return null;
            const d = new Date();
            d.setHours(parseInt(match[1]), parseInt(match[2]), 0, 0);
            return d;
        }

        function handleData(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const now = new Date();
            let sessions = [];
            let currentSession = null;

            for (let i = 0; i < rows.length; i++) {
                const cellVal = (rows[i].c && rows[i].c[0]) ? rows[i].c[0].v : "";
                if (typeof cellVal === 'string' && cellVal.includes("אימון")) {
                    if (currentSession) sessions.push(currentSession);
                    currentSession = { time: parseSheetTime(cellVal), title: cellVal, trainees: [] };
                } else if (currentSession && cellVal && cellVal !== "מתאמנת") {
                    currentSession.trainees.push(rows[i].c);
                }
            }
            if (currentSession) sessions.push(currentSession);

            let activeSession = null;
            for (let i = 0; i < sessions.length; i++) {
                const s = sessions[i];
                const nextS = sessions[i+1];
                if (!s.time) continue;
                if (i === 0) {
                    const pre = new Date(s.time.getTime() - 30 * 60000);
                    const end = nextS ? nextS.time : new Date(s.time.getTime() + 70 * 60000);
                    if (now >= pre && now < end) activeSession = s;
                } else if (i === sessions.length - 1) {
                    if (now >= s.time && now < new Date(s.time.getTime() + 70 * 60000)) activeSession = s;
                } else if (now >= s.time && now < nextS.time) {
                    activeSession = s;
                }
            }
            renderView(activeSession);
        }

        function renderView(session) {
            const container = document.getElementById('container');
            const info = document.getElementById('training-info');
            
            if (!session) {
                container.innerHTML = '<div class="status-msg">אין אימון פעיל כרגע</div>';
                info.innerText = 'ממתין לאימון';
                return;
            }

            info.innerText = session.title;
            const trainees = session.trainees;
            container.innerHTML = '';

            // חלוקה לשתי שורות אם יש יותר מ-3 מתאמנות
            const splitIdx = trainees.length > 3 ? Math.ceil(trainees.length / 2) : trainees.length;
            const rows = [trainees.slice(0, splitIdx), trainees.slice(splitIdx)];

            rows.forEach(rowTrainees => {
                if (rowTrainees.length === 0) return;
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                
                rowTrainees.forEach(trainee => {
                    const name = trainee[0] ? trainee[0].v : "מתאמנת";
                    let exercisesHtml = "";
                    for (let j = 1; j < trainee.length; j += 3) {
                        const ex = trainee[j] ? trainee[j].v : '';
                        if (ex && ex !== "" && ex !== "...") {
                            const w = (trainee[j+1] && trainee[j+1].v) ? trainee[j+1].v : '';
                            const r = (trainee[j+2] && trainee[j+2].v) ? trainee[j+2].v : '';
                            exercisesHtml += `<div class="ex-row">
                                <div class="ex-text"><span>${ex}</span><span class="weight">${w}</span></div>
                                <div class="reps">${r}</div>
                            </div>`;
                        }
                    }
                    rowDiv.innerHTML += `<div class="card"><div class="name">${name}</div><div class="ex-list">${exercisesHtml}</div></div>`;
                });
                container.appendChild(rowDiv);
            });
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=${Date.now()}`;
            document.head.appendChild(s);
            s.onload = () => s.remove();
        }

        setInterval(refresh, 10000);
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('he-IL', {hour12:false});
        }, 1000);
        refresh();
    </script>
</body>
</html>
