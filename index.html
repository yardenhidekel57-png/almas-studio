<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMA'S STUDIO - Plasma View</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
        
        .header {
            display: flex; justify-content: center; align-items: center;
            padding: 20px; background-color: #000; 
            border-bottom: 5px solid #00ffcc; height: 12vh;
            position: relative;
        }
        .studio-name { font-size: 6vh; color: #ffd700; font-weight: 900; letter-spacing: 3px; }
        #live-clock { position: absolute; left: 40px; font-size: 4vh; color: #00ffcc; font-weight: bold; }

        .cards-grid { 
            display: grid; 
            gap: 30px; 
            padding: 30px;
            /* 2 כרטיסיות בשורה למסך 50 אינץ' */
            grid-template-columns: repeat(2, 1fr); 
            overflow-y: auto; 
            height: 88vh; 
            align-content: start;
        }

        .card { 
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border-radius: 40px; 
            padding: 4vh; 
            border: 3px solid #333; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .trainee-name { 
            font-size: 7vh; /* שם ענק */
            color: #ffd700; 
            text-align: center; 
            margin-bottom: 2.5vh; 
            border-bottom: 4px solid #ffd700; 
            padding-bottom: 1.5vh; 
            font-weight: 900; 
        }

        .exercise-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 4.5vh; /* תרגילים ברורים מרחוק */
            padding: 2vh 0; 
            border-bottom: 1px solid #222; 
        }

        .weight { color: #ff9f43; font-weight: bold; margin-right: 15px; font-size: 4.8vh; }
        .reps { 
            color: #00ffcc; 
            font-weight: 900; 
            border: 3px solid #00ffcc; 
            padding: 8px 25px; 
            border-radius: 20px; 
            background: rgba(0, 255, 204, 0.1);
        }

        /* התאמה לאייפון במידה ותפתחי משם */
        @media (max-width: 1024px) {
            .cards-grid { grid-template-columns: 1fr; }
            .studio-name { font-size: 4vh; }
            .trainee-name { font-size: 5vh; }
            .exercise-row { font-size: 3vh; }
        }

        .cards-grid::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div id="live-clock">00:00</div>
    <div class="studio-name">ALMA'S STUDIO</div>
</div>

<div id="main-grid" class="cards-grid"></div>

<script>
    const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';

    function onData(data) {
        if (!data || !data.table) return;
        const rows = data.table.rows;
        const now = new Date();
        const nowMins = now.getHours() * 60 + now.getMinutes();

        let allWorkouts = [];
        for (let i = 0; i < rows.length; i++) {
            const firstCell = rows[i].c && rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
            if (firstCell.startsWith("אימון")) {
                const tm = firstCell.match(/(\d{1,2}):(\d{2})/);
                if (tm) allWorkouts.push({ index: i, mins: parseInt(tm[1]) * 60 + parseInt(tm[2]) });
            }
        }

        let activeW = null;
        for (let w of allWorkouts) { if (nowMins >= w.mins) activeW = w; }

        const grid = document.getElementById('main-grid');
        if (activeW) {
            let html = "";
            let j = activeW.index + 1;
            while (j < rows.length) {
                if (!rows[j].c || !rows[j].c[0] || rows[j].c[0].v.toString().includes("אימון")) break;
                
                let exHtml = "";
                for (let k = 1; k < rows[j].c.length; k += 3) {
                    if (rows[j].c[k]?.v && rows[j].c[k].v !== "...") {
                        exHtml += `
                            <div class="exercise-row">
                                <div>${rows[j].c[k].v} <span class="weight">${rows[j].c[k+1]?.v || ''}</span></div>
                                <span class="reps">${rows[j].c[k+2]?.v || '-'}</span>
                            </div>`;
                    }
                }
                
                html += `
                    <div class="card">
                        <div class="trainee-name">${rows[j].c[0].v}</div>
                        ${exHtml}
                    </div>`;
                j++;
            }
            grid.innerHTML = html;
        }
    }

    function fetchData() {
        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:onData&gid=0&tcb=${Date.now()}`;
        document.body.appendChild(script);
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
    }, 1000);

    setInterval(fetchData, 10000);
    fetchData();
</script>

</body>
</html>
