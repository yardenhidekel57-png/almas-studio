<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alma Studio - תצוגה מותאמת</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        
        body { 
            display: flex; flex-direction: column;
            padding: 15px; color: #fff; 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        
        /* כותרת */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 25px; background-color: #111; border-radius: 20px;
            border-bottom: 4px solid #00ffcc; margin-bottom: 15px; flex-shrink: 0;
        }
        .studio-name { font-size: 2.5rem; color: #ffd700; font-weight: 900; }
        #live-clock { font-size: 2.2rem; color: #00ffcc; font-weight: bold; }

        /* גריד חכם - תופס את כל המקום הפנוי */
        .cards-grid { 
            flex-grow: 1;
            display: grid; gap: 20px; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            overflow-y: auto;
            align-content: start;
        }

        /* כרטיס מתאמנת ענק */
        .card { 
            background-color: #161616; border-radius: 30px; padding: 30px; 
            border: 3px solid #282828; box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            display: flex; flex-direction: column;
        }
        .trainee-name { 
            font-size: 3.5rem; color: #ffd700; text-align: center; 
            margin-bottom: 20px; border-bottom: 3px solid #333; padding-bottom: 15px;
            font-weight: 900;
        }
        .exercise-row { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 2.2rem; padding: 15px 0; border-bottom: 1px solid #222;
        }
        .exercise-name { flex: 1; }
        .weight { color: #ff9f43; font-weight: bold; margin-right: 15px; }
        .reps { 
            color: #00ffcc; font-weight: bold; border: 2px solid #00ffcc; 
            padding: 5px 20px; border-radius: 12px; font-size: 2rem;
            min-width: 80px; text-align: center;
        }

        /* הודעת "אין אימון" */
        .no-workout {
            grid-column: 1/-1; text-align: center; margin-top: 100px;
            font-size: 4rem; color: #222; font-weight: 900; letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            .cards-grid { grid-template-columns: 1fr; }
            .trainee-name { font-size: 2.5rem; }
            .exercise-row { font-size: 1.6rem; }
            .reps { font-size: 1.4rem; padding: 3px 10px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div id="live-clock">00:00</div>
    <div class="studio-name">ALMA STUDIO</div>
    <div style="width: 50px;"></div>
</div>

<div id="main-grid" class="cards-grid">
    <div class="no-workout">ALMA STUDIO</div>
</div>

<script>
    const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';

    function onData(data) {
        if (!data || !data.table) return;
        const rows = data.table.rows;
        const grid = document.getElementById('main-grid');
        
        const now = new Date();
        const currentMins = now.getHours() * 60 + now.getMinutes();
        
        let foundWorkout = [];

        for (let i = 0; i < rows.length; i++) {
            const firstCell = rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
            
            if (firstCell.startsWith("אימון")) {
                const timeMatch = firstCell.match(/(\d{1,2}):?(\d{2})?/);
                if (timeMatch) {
                    const h = parseInt(timeMatch[1]);
                    const m = timeMatch[2] ? parseInt(timeMatch[2]) : 0;
                    const workoutMins = h * 60 + m;

                    // תנאי נוקשה: מציג רק אם השעה הנוכחית היא בטווח של 59 דקות משעת האימון
                    // ברגע שעוברת שעה בדיוק - האימון נמחק מהמסך
                    if (currentMins >= workoutMins && currentMins < (workoutMins + 60)) {
                        let j = i + 1;
                        while (j < rows.length && rows[j].c[0] && !rows[j].c[0].v.toString().startsWith("אימון")) {
                            foundWorkout.push(rows[j]);
                            j++;
                        }
                        break; 
                    }
                }
            }
        }

        if (foundWorkout.length > 0) {
            grid.innerHTML = foundWorkout.map(row => {
                const name = row.c[0].v;
                let exercisesHtml = '';
                for (let k = 1; k < row.c.length; k += 3) {
                    const ex = row.c[k] ? row.c[k].v : '';
                    const w = (row.c[k+1] && row.c[k+1].v) ? row.c[k+1].v : '';
                    const r = (row.c[k+2] && row.c[k+2].v) ? row.c[k+2].v : '-';
                    if (ex && ex !== "...") {
                        exercisesHtml += `
                            <div class="exercise-row">
                                <div class="exercise-name">${ex} <span class="weight">${w}</span></div>
                                <span class="reps">${r}</span>
                            </div>`;
                    }
                }
                return `
                    <div class="card">
                        <div class="trainee-name">${name}</div>
                        ${exercisesHtml}
                    </div>`;
            }).join('');
        } else {
            // מסך נקי כשיש הפסקה בין אימונים
            grid.innerHTML = '<div class="no-workout">ALMA STUDIO</div>';
        }
    }

    function fetchData() {
        const oldScript = document.getElementById('sheets-script');
        if (oldScript) oldScript.remove();
        const script = document.createElement('script');
        script.id = 'sheets-script';
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:onData&gid=0&tcb=${Date.now()}`;
        document.body.appendChild(script);
    }

    // רענון כל 10 שניות כדי שחילופי האימונים יהיו מהירים
    setInterval(fetchData, 10000);
    setInterval(() => {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
    }, 1000);
    
    fetchData();
</script>
</body>
</html>
