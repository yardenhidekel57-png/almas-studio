<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alma's Studio - 50 Inch Display</title>
    <style>
        * { box-sizing: border-box; }
        html, body { 
            height: 100vh; margin: 0; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 2vh; }

        /* כותרת ענקית למסך 50 אינץ' */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #111; padding: 0 4vw; border-radius: 20px; 
            border-bottom: 6px solid #00ffcc; height: 12vh; margin-bottom: 2vh;
            flex-shrink: 0; position: relative;
        }
        .studio-logo { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-main { font-size: 4rem; color: #ffd700; font-weight: 900; line-height: 1; }
        .logo-sub { font-size: 1.2rem; color: #00ffcc; letter-spacing: 8px; display: block; }

        /* גריד גמיש: שורה ראשונה 3 כרטיסיות, שורה שנייה 2 כרטיסיות (מתמרכזות) */
        #main-grid { 
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: stretch;
            gap: 2vh; 
            flex-grow: 1;
        }

        .card { 
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d); 
            border: 2px solid #333; border-radius: 30px; 
            padding: 2.5vh; display: flex; flex-direction: column;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            width: calc(33% - 2vh); /* 3 בשורה הראשונה */
            height: calc(43vh);
        }

        /* עבור 2 המתאמנות האחרונות - שיהיו גדולות וממורכזות */
        .card:nth-child(n+4) {
            width: calc(45% - 2vh);
        }

        .name { 
            font-size: 3.5rem; color: #ffd700; text-align: center; 
            border-bottom: 3px solid #444; margin-bottom: 1.5vh; 
            padding-bottom: 1vh; font-weight: 900;
        }

        .ex-list {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
        }

        .ex-row { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 2rem; padding: 1vh 0; border-bottom: 1px solid #222;
        }

        .reps { 
            color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); 
            padding: 0.5vh 1.5vw; border-radius: 15px; border: 2px solid rgba(0, 255, 204, 0.3);
        }
        
        .weight { color: #ff9f43; font-weight: bold; margin-right: 15px; font-size: 1.6rem; }
    </style>
</head>
<body>

    <div class="header">
        <div id="date" style="font-size: 2rem; color: #888;">--/--</div>
        <div class="studio-logo">
            <span class="logo-main">Alma's</span>
            <span class="logo-sub">STUDIO</span>
        </div>
        <div id="time" style="font-size: 3.5rem; color: #00ffcc; font-weight: 900;">00:00:00</div>
    </div>

    <div id="main-grid"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function handleData(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const grid = document.getElementById('main-grid');
            let content = '';
            let count = 0;

            for (let i = 0; i < rows.length && count < 6; i++) {
                const r = rows[i].c;
                if (!r || !r[0] || !r[0].v) continue;
                
                const name = r[0].v.toString().trim();
                if (name === "" || name.includes("אימון") || name === "מתאמנת") continue;

                let cardHtml = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                
                for (let j = 1; j < r.length; j += 3) {
                    const ex = r[j] ? r[j].v : '';
                    if (ex && ex !== "" && ex !== "...") {
                        const w = (r[j+1] && r[j+1].v) ? r[j+1].v : '';
                        const reps = (r[j+2] && r[j+2].v) ? r[j+2].v : '';
                        cardHtml += `<div class="ex-row">
                                        <div><span>${ex}</span> <span class="weight">${w}</span></div>
                                        <span class="reps">${reps}</span>
                                     </div>`;
                    }
                }
                cardHtml += `</div></div>`;
                content += cardHtml;
                count++;
            }
            grid.innerHTML = content;
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=${Date.now()}`;
            document.head.appendChild(s);
            s.onload = () => s.remove();
        }

        setInterval(refresh, 10000);
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('he-IL');
            document.getElementById('date').innerText = now.toLocaleDateString('he-IL', {day:'numeric', month:'numeric'});
        }, 1000);

        refresh();
    </script>
</body>
</html>
