<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ALMA'S STUDIO</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding-top: 100px; /* המרווח מהפס של הדפדפן */
            text-align: center;
        }

        h1 {
            font-size: 60px;
            margin: 0 0 30px 0;
        }

        .container {
            display: table;
            width: 95%;
            margin: 0 auto;
            border-spacing: 20px;
        }

        .row {
            display: table-row;
        }

        .card {
            display: table-cell;
            background: #111;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            width: 33%;
            vertical-align: top;
            text-align: right;
        }

        .name {
            font-size: 35px;
            font-weight: bold;
            border-bottom: 2px solid #444;
            margin-bottom: 15px;
            text-align: center;
        }

        .list {
            font-size: 25px;
            list-style: none;
            padding: 0;
        }

        .item {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
