<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alma's Studio - Plasma Fix</title>
    <style>
        * { box-sizing: border-box; }
        html, body { 
            height: 100vh; margin: 0; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: system-ui, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 10px; }

        .header { 
            height: 10vh; background: #111; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 30px; border-bottom: 4px solid #00ffcc; border-radius: 15px;
            margin-bottom: 10px; flex-shrink: 0;
        }
        .logo-main { font-size: 3rem; color: #ffd700; font-weight: 900; }

        /* מיכל ראשי גמיש */
        #container {
            display: flex;
            flex-direction: column;
            height: 88vh;
            gap: 15px;
        }

        /* שורות בגובה קבוע - זה מונע את העלייה אחד על השני */
        .row {
            display: flex;
            height: 48%; /* חלוקה שווה בין שתי שורות */
            gap: 15px;
            justify-content: center;
        }

        .card { 
            background: #161616; border: 2px solid #333; border-radius: 20px; 
            display: flex; flex-direction: column; flex: 1;
            padding: 15px; overflow: hidden;
            max-width: 32%; /* שלוש כרטיסיות בשורה */
        }

        .name { 
            font-size: 2.5rem; color: #ffd700; text-align: center; 
            border-bottom: 2px solid #444; margin-bottom: 10px; font-weight: 900;
        }

        .ex-list { flex-grow: 1; overflow-y: auto; }
        .ex-list::-webkit-scrollbar { width: 0; } /* הסתרת סקרולר */

        .ex-row { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.5rem; padding: 8px 0; border-bottom: 1px solid #222;
        }

        .reps { 
            color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); 
            padding: 2px 10px; border-radius: 8px; border: 1px solid #00ffcc;
            font-size: 1.4rem;
        }
        
        .weight { color: #ff9f43; font-weight: bold; font-size: 1.2rem; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div id="date" style="font-size: 1.5rem;">--/--</div>
        <div class="logo-main">Alma's STUDIO</div>
        <div id="time" style="font-size: 2.5rem; color: #00ffcc; font-weight: 900;">00:00:00</div>
    </div>

    <div id="container">
        <div class="row" id="row-1"></div>
        <div class="row" id="row-2"></div>
    </div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function handleData(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const row1 = document.getElementById('row-1');
            const row2 = document.getElementById('row-2');
            row1.innerHTML = ''; row2.innerHTML = '';
            
            let count = 0;
            for (let i = 0; i < rows.length; i++) {
                const r = rows[i].c;
                if (!r || !r[0] || !r[0].v) continue;
                const name = r[0].v.toString().trim();
                if (name === "" || name.includes("אימון") || name === "מתאמנת") continue;

                let html = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                for (let j = 1; j < r.length; j += 3) {
                    const ex = r[j] ? r[j].v : '';
                    if (ex && ex !== "" && ex !== "...") {
                        const w = (r[j+1] && r[j+1].v) ? r[j+1].v : '';
                        const reps = (r[j+2] && r[j+2].v) ? r[j+2].v : '';
                        html += `<div class="ex-row">
                                    <div><span>${ex}</span><span class="weight">${w}</span></div>
                                    <div class="reps">${reps}</div>
                                 </div>`;
                    }
                }
                html += `</div></div>`;
                
                if (count < 3) row1.innerHTML += html;
                else if (count < 6) row2.innerHTML += html;
                count++;
            }
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=${Date.now()}`;
            document.head.appendChild(s);
            s.onload = () => s.remove();
        }

        setInterval(refresh, 10000);
        setInterval(() => {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString('he-IL');
            document.getElementById('date').innerText = n.toLocaleDateString('he-IL', {day:'numeric', month:'numeric'});
        }, 1000);
        refresh();
    </script>
</body>
</html>
