<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alma's Studio - Fixed Sync</title>
    <style>
        /* העיצוב נשאר זהה כדי לשמור על הנראות */
        * { box-sizing: border-box; }
        html, body { height: 100vh; margin: 0; padding: 0; overflow: hidden; background-color: #000; color: white; font-family: system-ui, sans-serif; }
        body { display: flex; flex-direction: column; padding: 10px; padding-top: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 0 30px; border-radius: 15px; border-bottom: 4px solid #00ffcc; height: 10vh; margin-bottom: 15px; position: relative; }
        .studio-logo { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-main { font-size: 2.2rem; color: #ffd700; font-weight: 900; }
        .logo-sub { font-size: 0.7rem; color: #00ffcc; letter-spacing: 4px; display: block; }
        #main-grid { display: grid; gap: 12px; flex-grow: 1; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .card { background: #161616; border: 2px solid #333; border-radius: 20px; padding: 12px; display: flex; flex-direction: column; }
        .name { font-size: 2rem; color: #ffd700; text-align: center; border-bottom: 2px solid #444; margin-bottom: 8px; font-weight: 900; }
        .ex-list { flex-grow: 1; display: flex; flex-direction: column; }
        .ex-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; font-size: 1.2rem; }
        .reps { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div id="date">--/--</div>
        <div class="studio-logo"><span class="logo-main">Alma's</span><span class="logo-sub">STUDIO</span></div>
        <div id="time" style="font-size: 2rem; color: #00ffcc;">00:00:00</div>
    </div>
    <div id="main-grid"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';

        function googleDocCallback(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';

            const now = new Date();
            const currentMin = now.getHours() * 60 + now.getMinutes();

            let targetRows = [];
            let foundSession = false;

            for (let i = 0; i < rows.length; i++) {
                let cell = rows[i].c[0] ? rows[i].c[0].v.toString() : "";
                
                if (cell.includes("אימון")) {
                    let nums = cell.match(/\d+/g);
                    if (nums && nums.length >= 2) {
                        let sHour = parseInt(nums[0]);
                        let sMin = parseInt(nums[1]);
                        let sTotal = sHour * 60 + sMin;

                        // תנאי פשוט: מציג 15 דקות לפני ועד 70 דקות אחרי
                        if (currentMin >= (sTotal - 15) && currentMin <= (sTotal + 70)) {
                            foundSession = true;
                            targetRows = [];
                            continue;
                        } else {
                            foundSession = false;
                        }
                    }
                }

                if (foundSession && cell !== "" && isNaN(cell)) {
                    targetRows.push(rows[i]);
                }
            }

            targetRows.slice(0, 6).forEach(row => {
                let name = row.c[0].v;
                let html = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                for (let j = 1; j < row.c.length; j += 3) {
                    let ex = row.c[j] ? row.c[j].v : '';
                    let reps = row.c[j+2] ? row.c[j+2].v : '';
                    if (ex) html += `<div class="ex-row"><span>${ex}</span><span class="reps">${reps}</span></div>`;
                }
                html += `</div></div>`;
                grid.innerHTML += html;
            });
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:googleDocCallback&tcb=${Date.now()}`;
            document.body.appendChild(s);
        }

        setInterval(refresh, 5000); // רענון מהיר כל 5 שניות לבדיקה
        setInterval(() => {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString('he-IL');
            document.getElementById('date').innerText = n.toLocaleDateString('he-IL');
        }, 1000);
        refresh();
    </script>
</body>
</html>
