<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDIO ALMA - LIVE BOARD SYSTEM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; line-height: 1.1; }
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: #000; color: white; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; padding: 2px; }
        .header { height: 55px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 3px solid #ff6600; margin-bottom: 5px; flex-shrink: 0; }
        .logo-main { font-size: 26px; color: #ff6600; font-weight: 900; }
        #time { font-size: 24px; color: #00ffcc; font-weight: 900; }
        
        .header-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #round-counter { font-size: 18px; color: #ff6600; font-weight: bold; margin-bottom: 2px; text-transform: uppercase; }
        
        #workout-timer { font-size: 28px; color: #ff0055; font-weight: 900; background: rgba(255, 0, 85, 0.1); padding: 2px 12px; border-radius: 6px; border: 1px solid #ff0055; font-family: monospace; }
        #workout-timer.running { color: #00ffcc; border-color: #00ffcc; background: rgba(0, 255, 204, 0.1); animation: blink 1s infinite alternate; }
        #workout-timer.halfway { color: #ff9f43; border-color: #ff9f43; background: rgba(255, 159, 103, 0.1); }
        #workout-timer.break { color: #ff9f43; border-color: #ff9f43; background: rgba(255, 159, 67, 0.15); animation: blink 1.5s infinite alternate; }
        
        #container { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; position: relative; }
        .row { display: flex; flex: 1; gap: 4px; justify-content: center; align-items: stretch; max-height: 48%; }
        .card { background: #111; border: 1.5px solid #333; border-radius: 10px; display: flex; flex-direction: column; flex: 1; padding: 6px; overflow: hidden; }
        .name { font-size: 20px; color: #ff6600; text-align: center; border-bottom: 2px solid #444; margin-bottom: 3px; font-weight: 900; padding-bottom: 2px; }
        .ex-list { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; }
        .ex-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding: 2px 0; height: 16%; }
        .ex-text { font-size: 16px; font-weight: 700; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; display: flex; align-items: center; }
        .reps { 
            color: #00ffcc; font-weight: 900; border: 1.5px solid #00ffcc; 
            padding: 1px 4px; border-radius: 4px; font-size: 14px; 
            min-width: 70px; text-align: center; background: rgba(0,255,204,0.05);
            margin-right: 5px;
        }
        .weight { color: #ff9f43; font-weight: 900; margin-right: 6px; font-size: 13px; background: rgba(255,159,67,0.1); padding: 0 3px; border-radius: 3px; }
        .footer-credit { height: 18px; font-size: 11px; color: #444; text-align: left; padding: 0 10px; font-family: Arial; }
        
        #audio-auth-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-btn { background: #ff6600; color: white; border: none; padding: 22px 45px; font-size: 26px; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 0 25px rgba(255,102,0,0.6); font-family: Arial, sans-serif; }
        .auth-btn:active { background: #e05500; }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.85; } }
    </style>
</head>

        // המרה של ה-Base64 למערך בייטים דיגיטלי שה-AudioContext יודע לנגן ישירות לרמקול
        function base64ToArrayBuffer(base64) {
            let binaryString = window.atob(base64.split(',')[1]);
            let len = binaryString.length;
            let bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // טעינה ופענוח מראש של כל קבצי הדיבור ישירות לתוך כרטיס הקול
        async function initAudioBuffers() {
            for (let key in audioDataB64) {
                try {
                    let arrayBuf = base64ToArrayBuffer(audioDataB64[key]);
                    // פענוח חומרתי של השמע
                    audioCtx.decodeAudioData(arrayBuf, (buffer) => {
                        audioBuffers[key] = buffer;
                    }, (e) => console.error("Error decoding " + key, e));
                } catch (e) { console.error(e); }
            }
        }

        // פונקציית ההקראה החדשה והחסינה - מנגנת קול אנושי ישירות דרך ה-AudioContext שעובד אצלך!
        function announce(type) {
            if (!isAudioUnlocked || !audioBuffers[type]) return;
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                // יצירת ערוץ ניגון ישיר בזמן אמת לתוך הרמקול של הטלוויזיה
                let source = audioCtx.createBufferSource();
                source.buffer = audioBuffers[type];
                source.connect(audioCtx.destination);
                source.start(0);
            } catch (e) {
                console.error("Announce Playback Error:", e);
            }
        }

        function activateAudioSystem() {
            isAudioUnlocked = true;
            document.getElementById('audio-auth-overlay').style.display = 'none';
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // טעינת קבצי השמע לזיכרון כרטיס הקול
                initAudioBuffers();

                // השמעת אישור קולי מיידי אנושי ("System Ready") דרך ערוץ השמע הישיר
                setTimeout(() => {
                    announce("ready");
                }, 400);

            } catch(e) { console.log(e); }

            loadData();
            setInterval(loadData, 2500);
        }

        function parseCSV(text) {
            let lines = text.split(/\r?\n/);
            return lines.map(line => {
                let cells = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    let char = line[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        cells.push(current.trim().replace(/^"|"$/g, ''));
                        current = '';
                    } else {
                        current += char;
                    }
                }
                cells.push(current.trim().replace(/^"|"$/g, ''));
                return cells;
            });
        }

        async function loadData() {
            if (!isAudioUnlocked) return;
            try {
                const timestamp = '&t=' + Date.now();
                
                const resTimer = await fetch(TIMER_URL + timestamp);
                const textTimer = await resTimer.text();
                if (textTimer && textTimer.trim().length > 0) {
                    const rowsTimer = parseCSV(textTimer);
                    parseTimerSettings(rowsTimer);
                }

                const resMain = await fetch(MAIN_URL + timestamp);
                const textMain = await resMain.text();
                if (textMain && textMain.trim().length > 0) {
                    const rowsMain = parseCSV(textMain);
                    parse(rowsMain);
                }

            } catch (e) { console.error(e); }
        }

        function parseTimerSettings(rows) {
            let sheetStatus = "STOP";

            for (let i = 0; i < rows.length; i++) {
                if (!rows[i] || rows[i].length < 2) continue;
                let label = rows[i][0] ? rows[i][0].trim() : "";
                let value = rows[i][1] ? rows[i][1].trim() : "";
                
                if (label === "זמן טיימר בדקות") {
                    let val = parseFloat(value);
                    if (!isNaN(val)) targetWorkSeconds = Math.round(val * 60);
                }
                if (label === "זמן הפסקה בדקות") {
                    let val = parseFloat(value);
                    if (!isNaN(val)) targetBreakSeconds = Math.round(val * 60);
                }
                if (label === "מצב נוכחי") {
                    sheetStatus = value.toUpperCase();
                }
            }

            if (timerStatus === "STOP" && lastSheetStatus !== "STOP" && sheetStatus !== "START" && sheetStatus !== "STOP") {
                if (timerSeconds !== targetWorkSeconds) {
                    timerSeconds = targetWorkSeconds;
                    updateTimerDisplay();
                }
            }

            if (sheetStatus !== lastSheetStatus) {
                if (sheetStatus === "RESET") {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerStatus = "STOP";
                    currentPhase = "WORK";
                    currentRound = 1;
                    timerSeconds = targetWorkSeconds;
                    initialDuration = targetWorkSeconds;
                    lastSpokenSecond = -1;
                    updateTimerDisplay();
                } else if (sheetStatus === "START" && timerStatus !== "START") {
                    timerStatus = "START";
                    if (timerSeconds <= 0 || timerSeconds === targetWorkSeconds) {
                        currentPhase = "WORK";
                        timerSeconds = targetWorkSeconds;
                        initialDuration = targetWorkSeconds;
                    }
                    lastSpokenSecond = -1;
                    startLocalTimer();
                } else if (sheetStatus === "STOP" && timerStatus === "START") {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerStatus = "STOP";
                    updateTimerDisplay();
                }
                lastSheetStatus = sheetStatus;
            }
        }

        function startLocalTimer() {
            if (timerInterval) clearInterval(timerInterval);
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                if (timerSeconds <= 0) {
                    if (currentPhase === "WORK" && targetBreakSeconds > 0) {
                        currentPhase = "BREAK";
                        timerSeconds = targetBreakSeconds;
                        initialDuration = targetBreakSeconds;
                        lastSpokenSecond = -1;
                        announce("break"); // הקראה אנושית: Break Time
                        updateTimerDisplay();
                    } else {
                        if (currentRound < TOTAL_ROUNDS) {
                            currentRound++;
                            currentPhase = "WORK";
                            timerSeconds = targetWorkSeconds;
                            initialDuration = targetWorkSeconds;
                            lastSpokenSecond = -1;
                            announce("next"); // הקראה אנושית: Next Round
                            updateTimerDisplay();
                        } else {
                            clearInterval(timerInterval);
                            timerInterval = null;
                            timerStatus = "STOP";
                            currentPhase = "WORK";
                            currentRound = 1;
                            announce("complete"); // הקראה אנושית: Workout Complete
                            updateTimerDisplay();
                        }
                    }
                    return;
                }

                timerSeconds--;
                updateTimerDisplay();

                // ספירה לאחור אנושית ב-5 השניות האחרונות (5, 4, 3, 2, 1) ישירות דרך כרטיס הקול
                if (timerSeconds <= 5 && timerSeconds > 0 && lastSpokenSecond !== timerSeconds) {
                    announce(timerSeconds.toString());
                    lastSpokenSecond = timerSeconds;
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('workout-timer');
            const roundEl = document.getElementById('round-counter');
            
            let mins = Math.floor(timerSeconds / 60);
            let secs = timerSeconds % 60;
            
            let prefix = currentPhase === "BREAK" ? "מנוחה: " : "";
            timerEl.innerText = `${prefix}${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            roundEl.innerText = `סבב ${currentRound} מתוך ${TOTAL_ROUNDS}`;

            if (timerStatus === "START") {
                if (currentPhase === "BREAK") {
                    timerEl.className = "break";
                } else {
                    timerEl.className = "running";
                    let halfTime = Math.floor(initialDuration / 2);
                    if (timerSeconds <= halfTime) {
                        timerEl.classList.add("halfway");
                    }
                }
            } else {
                timerEl.className = "";
            }
        }

        function parse(rows) {
            const now = new Date();
            const nowMin = (now.getHours() * 60) + now.getMinutes();
            let sessions = [], current = null;

            rows.forEach(row => {
                if (!row || row.length === 0) return;
                let firstCell = row[0] ? row[0].trim() : "";
                
                if (firstCell.includes("אימון")) {
                    const m = firstCell.match(/(\d{1,2}):(\d{2})/);
                    if (m) {
                        if (current) sessions.push(current);
                        current = { start: (parseInt(m[1])*60)+parseInt(m[2]), title: firstCell, trainees: [] };
                    }
                } else if (current && firstCell !== "מתאמנת" && firstCell !== "") {
                    if (!["זמן טיימר בדקות", "זמן הפסקה בדקות", "מצב נוכחי"].includes(firstCell)) {
                        current.trainees.push(row);
                    }
                }
            });
            if (current) sessions.push(current);

            let active = null;
            for (let i = 0; i < sessions.length; i++) {
                let s = sessions[i];
                let nextS = sessions[i+1];
                if (nowMin >= s.start && (!nextS || nowMin < nextS.start)) {
                    if (nowMin < s.start + 65) active = s;
                }
            }

            render(active);
        }

        function render(active) {
            const container = document.getElementById('container');
            if (!active) {
                container.innerHTML = '<div style="text-align:center;margin-top:20%;font-size:24px;color:#555;">אין אימון פעיל כרגע</div>';
                return;
            }
            container.innerHTML = '';
            
            const trainees = active.trainees.filter(t => t[0]);
            const max = trainees.length <= 3 ? trainees.length : Math.ceil(trainees.length / 2);
            let rowDiv = document.createElement('div');
            rowDiv.className = 'row';

            trainees.forEach((t, i) => {
                if (i > 0 && i % max === 0) {
                    container.appendChild(rowDiv);
                    rowDiv = document.createElement('div');
                    rowDiv.className = 'row';
                }
                
                let exs = "";
                for (let m = 1; m < t.length; m++) {
                    let val = t[m] ? t[m].trim() : "";
                    if (val === "" || val === "..." || val === "null") continue;

                    if (val.length > 4 || (!val.includes('.') && !val.includes(',') && !val.toLowerCase().includes('k'))) {
                        let name = val;
                        let weight = "";
                        let reps = "";

                        for(let k=1; k<=2; k++) {
                            let next = t[m+k] ? t[m+k].trim().toLowerCase() : "";
                            if (next.includes('k') || (next.match(/^\d+$/) && next.length <= 3)) {
                                weight = t[m+k].trim();
                            } else if (next.includes('.') || next.includes(',') || (next.match(/^\d+$/) && next.length > 0)) {
                                reps = t[m+k].trim();
                            }
                        }

                        reps = reps.replace(/,/g, 'x').replace(/\./g, 'x');
                        exs += `<div class="ex-row"><div class="ex-text"><span>${name}</span>${weight ? `<span class="weight">${weight}</span>` : ''}</div><div class="reps">${reps || '--'}</div></div>`;
                        m += 2;
                    }
                }
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="name">${t[0]}</div><div class="ex-list">${exs}</div>`;
                rowDiv.appendChild(card);
            });
            container.appendChild(rowDiv);
        }

        setInterval(() => {
            const d = new Date();
            document.getElementById('time').innerText = d.toTimeString().split(' ')[0];
        }, 1000);
    </script>
</body>
</html>
