<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDIO ALMA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: Arial, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 5px; }

        .header { 
            height: 60px; background: #111; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 20px; border-bottom: 4px solid #ff6600; border-radius: 8px;
            margin-bottom: 10px; flex-shrink: 0; position: relative;
        }
        
        .logo-main { 
            font-size: 35px; color: #ff6600; font-weight: 900; 
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
        }
        
        #time { font-size: 30px; color: #00ffcc; font-weight: 900; }
        #training-info { font-size: 20px; color: #ff6600; font-weight: bold; }

        #container { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
        /* הגבלה קשיחה של גובה השורה כדי למנוע חיתוך */
        .row { display: flex; flex: 1; gap: 10px; justify-content: center; align-items: stretch; max-height: 46%; }

        .card { 
            background: #161616; border: 2px solid #333; border-radius: 15px; 
            display: flex; flex-direction: column; flex: 1; padding: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); overflow: hidden;
        }

        .name { 
            font-size: 32px; color: #ff6600; text-align: center; 
            border-bottom: 2px solid #444; margin-bottom: 8px; font-weight: 900;
            padding-bottom: 4px; line-height: 1.1;
        }

        .ex-list { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .ex-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding: 4px 0; }

        /* הקטנת פונט התרגיל כדי למנוע "שבירת שורות" שדוחפת הכל למטה */
        .ex-text { font-size: 24px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; }
        
        .reps { 
            color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); 
            padding: 4px 12px; border-radius: 6px; border: 2px solid #00ffcc; 
            font-size: 22px; min-width: 90px; text-align: center; 
        }
        
        .weight { color: #ff9f43; font-weight: bold; font-size: 18px; margin-right: 8px; }
        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 50px; color: #444; }
    </style>
</head>
<body>

    <div class="header">
        <div id="training-info">מעדכן...</div>
        <div class="logo-main">STUDIO ALMA</div>
        <div id="time">00:00:00</div>
    </div>

    <div id="container"></div>

    <script>
        var SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function parseSheetTime(str) {
            var match = str.match(/(\d{1,2}):(\d{2})/);
            if (!match) return null;
            var d = new Date();
            d.setHours(parseInt(match[1]), parseInt(match[2]), 0, 0);
            return d;
        }

        function handleData(data) {
            if (!data || !data.table) return;
            var rows = data.table.rows;
            var now = new Date();
            var sessions = [];
            var currentSession = null;

            for (var i = 0; i < rows.length; i++) {
                var cellVal = (rows[i].c && rows[i].c[0]) ? rows[i].c[0].v : "";
                if (typeof cellVal === 'string' && cellVal.indexOf("אימון") !== -1) {
                    if (currentSession) sessions.push(currentSession);
                    currentSession = { time: parseSheetTime(cellVal), title: cellVal, trainees: [] };
                } else if (currentSession && cellVal && cellVal !== "מתאמנת") {
                    currentSession.trainees.push(rows[i].c);
                }
            }
            if (currentSession) sessions.push(currentSession);

            var activeSession = null;
            for (var j = 0; j < sessions.length; j++) {
                var s = sessions[j];
                var nextS = sessions[j+1];
                if (!s.time) continue;
                var startTime = s.time;
                var endTime = nextS ? nextS.time : new Date(s.time.getTime() + 60 * 60000);
                if (now >= startTime && now < endTime) {
                    activeSession = s;
                    break;
                }
            }
            renderView(activeSession);
        }

        function renderView(session) {
            var container = document.getElementById('container');
            var info = document.getElementById('training-info');
            
            if (!session || session.trainees.length === 0) {
                container.innerHTML = '<div class="status-msg">אין אימון פעיל</div>';
                info.innerText = 'הפסקה';
                return;
            }

            info.innerText = session.title;
            var trainees = session.trainees;
            container.innerHTML = '';

            var numTrainees = trainees.length;
            var maxPerRow = numTrainees <= 3 ? numTrainees : Math.ceil(numTrainees / 2);
            
            var rowDiv = document.createElement('div');
            rowDiv.className = 'row';

            for (var k = 0; k < trainees.length; k++) {
                if (k > 0 && k % maxPerRow === 0) {
                    container.appendChild(rowDiv);
                    rowDiv = document.createElement('div');
                    rowDiv.className = 'row';
                }

                var trainee = trainees[k];
                var name = trainee[0] ? trainee[0].v : "מתאמנת";
                var exercisesHtml = "";
                
                for (var m = 1; m < trainee.length; m += 3) {
                    var ex = (trainee[m] && trainee[m].v) ? trainee[m].v : '';
                    if (ex && ex !== "" && ex !== "...") {
                        var w = (trainee[m+1] && trainee[m+1].v) ? trainee[m+1].v : '';
                        var r = (trainee[m+2] && trainee[m+2].v) ? trainee[m+2].v : '';
                        exercisesHtml += '<div class="ex-row">' +
                            '<div class="ex-text"><span>' + ex + '</span><span class="weight">' + w + '</span></div>' +
                            '<div class="reps">' + r + '</div>' +
                        '</div>';
                    }
                }

                var card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = '<div class="name">' + name + '</div><div class="ex-list">' + exercisesHtml + '</div>';
                rowDiv.appendChild(card);
            }
            container.appendChild(rowDiv);
        }

        function refresh() {
            var s = document.createElement('script');
            var timestamp = new Date().getTime();
            s.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=' + timestamp;
            document.head.appendChild(s);
            s.onload = function() { if (s.parentNode) s.parentNode.removeChild(s); };
        }

        setInterval(refresh, 10000);
        setInterval(function() {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('he-IL', {hour12:false});
        }, 1000);
        
        refresh();
    </script>
</body>
</html>
