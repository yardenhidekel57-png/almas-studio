<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALMA'S STUDIO - LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* ביטול גלילה מוחלט */
            background-color: #000;
            color: #fff;
            font-family: 'Assistant', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* מרווח ביטחון כדי שהפס של הדפדפן בטלוויזיה לא יסתיר את הכותרת */
            padding-top: 80px; 
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            margin: 0 0 20px 0;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        #workout-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 עמודות */
            grid-template-rows: repeat(2, 1fr);    /* 2 שורות */
            gap: 15px;
            width: 96%;
            height: calc(100vh - 180px); /* מתאים את הגובה למסך בלי גלילה */
            padding-bottom: 20px;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .trainee-name {
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 700;
            color: #fff;
            border-bottom: 1px solid #444;
            margin-bottom: 12px;
            padding-bottom: 8px;
            text-align: center;
        }

        .exercise-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: right;
            overflow-y: hidden;
        }

        .exercise-item {
            font-size: clamp(1rem, 2vw, 1.4rem);
            margin-bottom: 8px;
            padding-right: 18px;
            position: relative;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .exercise-item::before {
            content: "•";
            position: absolute;
            right: 0;
            color: #666;
        }

        /* הודעת טעינה */
        #loading {
            font-size: 24px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>ALMA'S STUDIO</h1>
    <div id="loading">טוען נתונים מהגיליון...</div>
    <div id="workout-grid" style="display: none;"></div>

    <script>
        // ה-ID של הגיליון שלך כבר מעודכן כאן
        const sheetId = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';
        const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        async function fetchData() {
            try {
                const res = await fetch(base);
                const text = await res.text();
                // חיתוך הטקסט המיותר שגוגל מחזירה
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                renderGrid(jsonData.table.rows);
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loading').innerText = "שגיאה בטעינת הנתונים. וודאי שהגיליון ציבורי.";
            }
        }

        function renderGrid(rows) {
            const grid = document.getElementById('workout-grid');
            const loading = document.getElementById('loading');
            grid.innerHTML = '';

            // לוקח רק את 6 השורות הראשונות
            rows.slice(0, 6).forEach((row) => {
                const name = row.c[0] ? row.c[0].v : 'מתאמנת';
                
                const card = document.createElement('div');
                card.className = 'card';
                
                let exercisesHtml = '';
                // עובר על כל התאים מהשני והלאה (התרגילים)
                for (let i = 1; i < row.c.length; i++) {
                    if (row.c[i] && row.c[i].v) {
                        exercisesHtml += `<li class="exercise-item">${row.c[i].v}</li>`;
                    }
                }

                card.innerHTML = `
                    <div class="trainee-name">${name}</div>
                    <ul class="exercise-list">${exercisesHtml}</ul>
                `;
                grid.appendChild(card);
            });

            loading.style.display = 'none';
            grid.style.display = 'grid';
        }

        // טעינה ראשונית ועדכון אוטומטי כל דקה
        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
