<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma's Studio - Universal Display</title>
    <style>
        /* הגדרות בסיס למניעת גלילה וחריגות */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: system-ui, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 1vh; }

        /* כותרת בגובה קבוע - 12% מהמסך */
        .header { 
            height: 12vh; background: #111; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 3vw; border-bottom: 0.5vh solid #00ffcc; border-radius: 2vh;
            margin-bottom: 1.5vh; flex-shrink: 0;
        }
        .logo-main { font-size: 5vh; color: #ffd700; font-weight: 900; }
        #time { font-size: 5vh; color: #00ffcc; font-weight: 900; }
        #date { font-size: 2.5vh; color: #888; }

        /* מיכל הכרטיסיות - 85% מהמסך */
        #container {
            height: 84vh;
            display: flex;
            flex-direction: column;
            gap: 2vh;
        }

        /* שורות בגובה קבוע - 41% מהמסך לכל שורה */
        .row {
            display: flex;
            height: 41vh;
            gap: 2vw;
            justify-content: center;
        }

        .card { 
            background: #161616; border: 0.3vh solid #333; border-radius: 3vh; 
            display: flex; flex-direction: column; flex: 1;
            padding: 1.5vh; overflow: hidden;
            max-width: 31vw; /* מבטיח ש-3 כרטיסיות יכנסו ברוחב */
        }

        .name { 
            font-size: 4vh; color: #ffd700; text-align: center; 
            border-bottom: 0.2vh solid #444; margin-bottom: 1vh; font-weight: 900;
            white-space: nowrap;
        }

        /* רשימת תרגילים שתמיד נשארת בתוך הריבוע */
        .ex-list { 
            flex-grow: 1; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 0.5vh;
        }
        .ex-list::-webkit-scrollbar { width: 0; }

        .ex-row { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 2.4vh; /* פונט שנגזר מגובה המסך */
            padding: 0.8vh 0; border-bottom: 0.1vh solid #222;
        }

        .reps { 
            color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); 
            padding: 0.4vh 1.2vw; border-radius: 1vh; border: 0.2vh solid #00ffcc;
            font-size: 2.2vh; min-width: 7vw; text-align: center;
        }
        
        .weight { color: #ff9f43; font-weight: bold; font-size: 2vh; margin-right: 1vw; }
    </style>
</head>
<body>

    <div class="header">
        <div id="date">--/--</div>
        <div class="logo-main">Alma's STUDIO</div>
        <div id="time">00:00:00</div>
    </div>

    <div id="container">
        <div class="row" id="row-1"></div>
        <div class="row" id="row-2"></div>
    </div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function handleData(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const row1 = document.getElementById('row-1');
            const row2 = document.getElementById('row-2');
            row1.innerHTML = ''; row2.innerHTML = '';
            
            let count = 0;
            for (let i = 0; i < rows.length; i++) {
                const r = rows[i].c;
                if (!r || !r[0] || !r[0].v) continue;
                const name = r[0].v.toString().trim();
                
                // התעלמות משורות כותרת או אימון
                if (name === "" || name.includes("אימון") || name === "מתאמנת") continue;

                let html = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                for (let j = 1; j < r.length; j += 3) {
                    const ex = r[j] ? r[j].v : '';
                    if (ex && ex !== "" && ex !== "...") {
                        const w = (r[j+1] && r[j+1].v) ? r[j+1].v : '';
                        const reps = (r[j+2] && r[j+2].v) ? r[j+2].v : '';
                        html += `<div class="ex-row">
                                    <div><span>${ex}</span><span class="weight">${w}</span></div>
                                    <div class="reps">${reps}</div>
                                 </div>`;
                    }
                }
                html += `</div></div>`;
                
                if (count < 3) row1.innerHTML += html;
                else if (count < 6) row2.innerHTML += html;
                count++;
            }
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=${Date.now()}`;
            document.head.appendChild(s);
            s.onload = () => s.remove();
        }

        setInterval(refresh, 10000);
        setInterval(() => {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString('he-IL');
            document.getElementById('date').innerText = n.toLocaleDateString('he-IL', {day:'numeric', month:'numeric'});
        }, 1000);
        refresh();
    </script>
</body>
</html>
