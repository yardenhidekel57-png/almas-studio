<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alma's Studio - 5 Trainees Fixed</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100vh; margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: system-ui, sans-serif; }
        body { display: flex; flex-direction: column; padding: 15px; }
        
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #111; padding: 0 30px; border-radius: 15px; 
            border-bottom: 4px solid #00ffcc; height: 10vh; margin-bottom: 15px;
            flex-shrink: 0; position: relative;
        }
        .studio-logo { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-main { font-size: 2.8rem; color: #ffd700; font-weight: 900; }
        .logo-sub { font-size: 0.9rem; color: #00ffcc; letter-spacing: 5px; display: block; }

        #main-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(2, 1fr);
            gap: 20px; flex-grow: 1;
        }

        .card { 
            background: #161616; border: 1px solid #333; border-radius: 25px; 
            padding: 18px; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .name { 
            font-size: 2.3rem; color: #ffd700; text-align: center; 
            border-bottom: 2px solid #444; margin-bottom: 10px; 
            padding-bottom: 8px; font-weight: 900;
        }

        .ex-list { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-evenly; }

        .ex-row { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.4rem; padding: 6px 0; border-bottom: 1px solid #222;
        }

        .reps { color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); padding: 3px 12px; border-radius: 10px; }
        .weight { color: #ff9f43; font-weight: bold; margin-right: 8px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="header">
        <div id="date" style="font-size: 1.4rem; color: #888;">--/--</div>
        <div class="studio-logo"><span class="logo-main">Alma's</span><span class="logo-sub">STUDIO</span></div>
        <div id="time" style="font-size: 2.5rem; color: #00ffcc; font-weight: 900;">00:00:00</div>
    </div>

    <div id="main-grid"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';

        function handleGoogleData(data) {
            if (!data || !data.table || !data.table.rows) return;
            
            const allRows = data.table.rows;
            const grid = document.getElementById('main-grid');
            let finalHtml = '';
            let traineeCount = 0;

            // עוברים על כל שורה בנפרד
            for (let i = 0; i < allRows.length; i++) {
                if (traineeCount >= 6) break;

                const cells = allRows[i].c;
                if (!cells || !cells[0] || !cells[0].v) continue;

                const traineeName = cells[0].v.toString().trim();
                
                // סינון שורות לא רלוונטיות
                if (traineeName === "" || traineeName.includes("אימון") || traineeName === "מתאמנת") continue;

                // התחלת בניית כרטיסייה
                let cardHtml = `<div class="card">
                                    <div class="name">${traineeName}</div>
                                    <div class="ex-list">`;
                
                let hasExercises = false;

                // לולאה פנימית לשליפת התרגילים של אותה מתאמנת
                for (let j = 1; j < cells.length; j += 3) {
                    const exercise = cells[j] ? cells[j].v : null;
                    if (exercise && exercise !== "" && exercise !== "...") {
                        const weight = (cells[j+1] && cells[j+1].v) ? cells[j+1].v : "";
                        const reps = (cells[j+2] && cells[j+2].v) ? cells[j+2].v : "";
                        
                        cardHtml += `<div class="ex-row">
                                        <div><span>${exercise}</span> <span class="weight">${weight}</span></div>
                                        <span class="reps">${reps}</span>
                                     </div>`;
                        hasExercises = true;
                    }
                }

                cardHtml += `</div></div>`;
                
                // הוספה לגריד הכללי
                finalHtml += cardHtml;
                traineeCount++;
            }

            grid.innerHTML = finalHtml;
        }

        function refresh() {
            const script = document.createElement('script');
            script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleGoogleData&gid=0&tcb=${Date.now()}`;
            document.head.appendChild(script);
            // מנקה את הסקריפט הישן מה-DOM
            script.onload = () => script.remove();
        }

        setInterval(refresh, 10000);
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('he-IL');
            document.getElementById('date').innerText = now.toLocaleDateString('he-IL', {weekday:'long', day:'numeric', month:'numeric'});
        }, 1000);

        refresh();
    </script>
</body>
</html>
