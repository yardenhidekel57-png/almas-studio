<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma's Studio - Live Board</title>
    <style>
        * { box-sizing: border-box; }
        html, body { 
            height: 100vh; margin: 0; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 10px; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #111; padding: 0 30px; border-radius: 15px; 
            border-bottom: 4px solid #00ffcc; height: 9vh; margin-bottom: 8px;
            flex-shrink: 0; position: relative;
        }

        .studio-logo { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-main { font-size: 2.5rem; color: #ffd700; font-weight: 900; letter-spacing: 2px; }
        .logo-sub { font-size: 0.8rem; color: #00ffcc; letter-spacing: 5px; text-transform: uppercase; display: block; margin-top: -5px; }

        #main-grid { 
            display: grid; gap: 12px; flex-grow: 1; height: 89vh; width: 100%;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 1fr; 
        }

        .card { 
            background: #161616; border: 2px solid #333; border-radius: 20px; 
            padding: 15px; display: flex; flex-direction: column;
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
            min-height: 0; 
        }

        .name { 
            font-size: clamp(1.4rem, 4vh, 2.5rem); color: #ffd700; 
            text-align: center; border-bottom: 2px solid #444; 
            margin-bottom: 5px; padding-bottom: 3px; font-weight: 900;
            flex-shrink: 0;
        }

        .ex-list {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            overflow: hidden;
        }

        .ex-row { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: clamp(0.9rem, 2.1vh, 1.8rem); 
            padding: 2px 0; 
            border-bottom: 1px solid #222;
        }

        .weight {
            color: #ff9f43; font-weight: bold; background: rgba(255, 159, 67, 0.1);
            padding: 1px 8px; border-radius: 6px; font-size: 0.85em;
        }

        .reps { 
            color: #00ffcc; font-weight: bold; background: rgba(0, 255, 204, 0.1); 
            padding: 1px 12px; border-radius: 8px; flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="date" style="font-size: 1.3rem;">--/--</div>
        <div class="studio-logo">
            <span class="logo-main">Alma's</span>
            <span class="logo-sub">STUDIO</span>
        </div>
        <div id="time" style="font-size: 2.2rem; color: #00ffcc; font-weight: bold;">00:00:00</div>
    </div>

    <div id="main-grid"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function googleDocCallback(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';

            let count = 0;
            for (let i = 0; i < rows.length && count < 6; i++) {
                const row = rows[i].c;
                if (!row || !row[0] || !row[0].v) continue;
                
                const val = row[0].v.toString().trim();
                // מדלג על שורות כותרת
                if (val.includes("אימון") || val.includes("מתאמנת") || val === "") continue;

                let html = `<div class="card"><div class="name">${val}</div><div class="ex-list">`;
                
                for (let j = 1; j < row.length; j += 3) {
                    const ex = row[j] ? row[j].v : '';
                    const weight = (row[j+1] && row[j+1].v) ? row[j+1].v : '';
                    const reps = (row[j+2] && row[j+2].v) ? row[j+2].v : '';
                    
                    if (ex && ex !== "" && ex !== "...") {
                        html += `<div class="ex-row">
                                    <div><span>${ex}</span> ${weight ? `<span class="weight">${weight}</span>` : ''}</div>
                                    <span class="reps">${reps}</span>
                                 </div>`;
                    }
                }
                html += `</div></div>`;
                grid.innerHTML += html;
                count++;
            }
        }

        function refresh() {
            const s = document.createElement('script');
            // מוודא שמושכים את הנתונים מהטאב הנכון (gid=0)
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:googleDocCallback&gid=0&tcb=${Date.now()}`;
            document.body.appendChild(s);
        }

        function clock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('he-IL');
            document.getElementById('date').innerText = now.toLocaleDateString('he-IL', {weekday:'long', day:'numeric', month:'numeric'});
        }

        setInterval(refresh, 10000); // רענון נתונים כל 10 שניות
        setInterval(clock, 1000);
        refresh(); 
        clock();
    </script>
</body>
</html>
