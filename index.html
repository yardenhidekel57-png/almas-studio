<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alma's Studio - Mobile Fix</title>
    <style>
        * { box-sizing: border-box; }
        
        /* תיקון גובה לאייפון */
        html, body { 
            height: 100%; 
            height: -webkit-fill-available; 
            margin: 0; 
            background-color: #050505; 
            color: white; 
            font-family: system-ui, -apple-system, sans-serif; 
            overflow: hidden; 
        }
        
        body { 
            display: flex; 
            flex-direction: column; 
            padding: 10px;
            box-sizing: border-box;
        }

        /* הדר עליון */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #111; padding: 10px 20px; border-radius: 15px; 
            border-bottom: 3px solid #00ffcc; min-height: 70px; margin-bottom: 10px;
            flex-shrink: 0; position: relative;
        }

        .studio-logo { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-main { font-size: 2.2rem; color: #ffd700; font-weight: 900; letter-spacing: 1px; line-height: 0.8; }
        .logo-sub { font-size: 0.8rem; color: #00ffcc; letter-spacing: 4px; text-transform: uppercase; display: block; margin-top: 4px; font-weight: bold; }
        
        #time { font-size: 1.5rem; color: #00ffcc; font-weight: bold; }

        /* גריד מרכזי - עם גלילה פנימית כדי שלא ידחף את הטיימר */
        #main-grid { 
            display: grid; gap: 15px; width: 100%; 
            flex-grow: 1;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            overflow-y: auto; 
            align-content: start;
            padding-bottom: 10px;
        }

        .card { 
            background: #161616; border: 2px solid #333; border-radius: 20px; 
            padding: 15px; display: flex; flex-direction: column; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .name { 
            font-size: 2rem; color: #ffd700; text-align: center; 
            border-bottom: 2px solid #444; margin-bottom: 10px; 
            padding-bottom: 5px; font-weight: 900;
        }
        
        .ex-list { display: flex; flex-direction: column; gap: 8px; }
        .ex-row { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 1.3rem; padding: 4px 0; border-bottom: 1px solid #222;
        }
        .weight { color: #ff9f43; font-weight: bold; background: rgba(255,159,67,0.1); padding: 0 5px; border-radius: 4px; }
        .reps { color: #00ffcc; font-weight: bold; background: rgba(0, 255, 204, 0.1); padding: 2px 10px; border-radius: 8px; }

        /* פאנל תחתון - מוצמד לתחתית */
        .footer-controls {
            background: #111; padding: 10px 15px; border-radius: 15px; 
            border-top: 3px solid #ff9f43; margin-top: 5px;
            display: flex; flex-direction: column; gap: 5px; flex-shrink: 0;
        }

        #timer-bar-container { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
        #timer-bar-fill { width: 100%; height: 100%; background: #ff9f43; transition: width 1s linear; }

        .timer-row { display: flex; justify-content: space-between; align-items: center; }
        #timer-display { font-size: 2.5rem; color: #ff9f43; font-weight: bold; font-variant-numeric: tabular-nums; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        .btn-start { background: #00816a; border-color: #00ffcc; }

        #session-label { color: #ffd700; font-weight: bold; font-size: 1.2rem; }

        /* התאמה למסכים קטנים (אייפון) */
        @media (max-width: 600px) {
            .logo-main { font-size: 1.6rem; }
            #timer-display { font-size: 2rem; }
            .btn { padding: 5px 10px; font-size: 0.9rem; }
            #main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body onclick="document.getElementById('finish-sound').load()">

    <div class="header">
        <div style="width: 60px;"></div>
        <div class="studio-logo">
            <span class="logo-main">Alma's</span>
            <span class="logo-sub">STUDIO</span>
        </div>
        <div id="time">00:00</div>
    </div>

    <div id="main-grid"></div>

    <div class="footer-controls">
        <div id="timer-bar-container"><div id="timer-bar-fill"></div></div>
        <div class="timer-row">
            <div id="session-label">טוען...</div>
            <div id="timer-display">07:00</div>
            <div class="btn-group">
                <button id="start-btn" class="btn btn-start" onclick="toggleTimer(event)">הפעל</button>
                <button class="btn" onclick="resetTimer(event)">איפוס</button>
            </div>
        </div>
    </div>

    <audio id="finish-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 
        const TOTAL_TIME = 7 * 60;
        let timeLeft = TOTAL_TIME;
        let timerRunning = false;
        let timerInterval;

        function toggleTimer(event) {
            if (event) event.stopPropagation();
            const btn = document.getElementById('start-btn');
            if (timerRunning) {
                clearInterval(timerInterval);
                btn.innerText = "המשך";
            } else {
                timerInterval = setInterval(updateTimer, 1000);
                btn.innerText = "עצור";
            }
            timerRunning = !timerRunning;
        }

        function resetTimer(event) {
            if (event) event.stopPropagation();
            clearInterval(timerInterval);
            timerRunning = false;
            timeLeft = TOTAL_TIME;
            document.getElementById('start-btn').innerText = "הפעל";
            updateTimerDisplay();
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                document.getElementById('finish-sound').play();
                timeLeft = TOTAL_TIME;
            } else { timeLeft--; }
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timer-bar-fill').style.width = (timeLeft / TOTAL_TIME) * 100 + "%";
        }

        function googleDocCallback(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const grid = document.getElementById('main-grid');
            const now = new Date();
            const currentTotalMinutes = now.getHours() * 60 + now.getMinutes();
            let targetSessionRows = [];
            let activeSessionTitle = "";

            for (let i = 0; i < rows.length; i++) {
                const firstCell = rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
                if (firstCell.includes("אימון")) {
                    const timeMatch = firstCell.match(/(\d{1,2}):?(\d{2})?/);
                    if (timeMatch) {
                        const h = parseInt(timeMatch[1]);
                        const m = timeMatch[2] ? parseInt(timeMatch[2]) : 0;
                        const start = h * 60 + m;
                        if (currentTotalMinutes >= start && currentTotalMinutes < (start + 60)) {
                            activeSessionTitle = firstCell;
                            let j = i + 1;
                            while (j < rows.length) {
                                const nextCell = rows[j].c[0] ? rows[j].c[0].v.toString().trim() : "";
                                if (nextCell.includes("אימון") || nextCell === "") break;
                                targetSessionRows.push(rows[j]);
                                j++;
                            }
                        }
                    }
                }
            }

            if (targetSessionRows.length > 0) {
                document.getElementById('session-label').innerText = activeSessionTitle;
                let html = '';
                targetSessionRows.forEach(row => {
                    const name = row.c[0].v;
                    html += `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                    for (let j = 1; j < row.c.length; j += 3) {
                        const ex = row.c[j] ? row.c[j].v : '';
                        const w = (row.c[j+1] && row.c[j+1].v) ? row.c[j+1].v : '';
                        const r = (row.c[j+2] && row.c[j+2].v) ? row.c[j+2].v : '-';
                        if (ex && ex !== "...") html += `<div class="ex-row"><div>${ex} <span class="weight">${w}</span></div><span class="reps">${r}</span></div>`;
                    }
                    html += `</div></div>`;
                });
                grid.innerHTML = html;
            } else {
                document.getElementById('session-label').innerText = "ממתין...";
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding-top:50px;color:#444;">אין אימון פעיל</div>';
            }
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:googleDocCallback&gid=0&tcb=${Date.now()}`;
            document.body.appendChild(s);
        }

        setInterval(refresh, 5000);
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
        refresh();
    </script>
</body>
</html>
