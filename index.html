<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO ALMA - Live Schedule</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: system-ui, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 1vh; }

        .header { 
            height: 8vh; background: #111; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 3vw; border-bottom: 0.4vh solid #ff6600; border-radius: 1.5vh;
            margin-bottom: 1vh; flex-shrink: 0;
        }
        .logo-main { font-size: 4.2vh; color: #ff6600; font-weight: 900; letter-spacing: 2px; }
        #time { font-size: 4.5vh; color: #00ffcc; font-weight: 900; }
        #training-info { font-size: 2.5vh; color: #ff6600; font-weight: bold; }

        #container { height: 88vh; display: flex; flex-direction: column; gap: 1.5vh; }
        .row { display: flex; height: 43vh; gap: 1.5vw; justify-content: center; }

        .card { 
            background: #161616; border: 0.2vh solid #333; border-radius: 2vh; 
            display: flex; flex-direction: column; flex: 1;
            padding: 1.5vh; overflow: hidden; max-width: 31vw;
        }

        .name { 
            font-size: 3.8vh; color: #ff6600; text-align: center; 
            border-bottom: 0.2vh solid #444; margin-bottom: 0.8vh; font-weight: 900;
            flex-shrink: 0; padding-bottom: 0.5vh;
        }

        .ex-list { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; min-height: 0; }
        .ex-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; flex: 1; min-height: 0; }
        .ex-text { font-size: clamp(1.2vh, 2.4vh, 3.5vh); font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .reps { color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); padding: 0.3vh 1.2vw; border-radius: 0.8vh; border: 0.15vh solid #00ffcc; font-size: clamp(1.2vh, 2.1vh, 3vh); min-width: 6.5vw; text-align: center; }
        .weight { color: #ff9f43; font-weight: bold; font-size: 0.85em; margin-right: 0.8vw; }
        
        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 6vh; color: #333; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <div id="training-info">מזהה אימון...</div>
        <div class="logo-main">STUDIO ALMA</div>
        <div id="time">00:00:00</div>
    </div>

    <div id="container">
        <div class="row" id="row-1"></div>
        <div class="row" id="row-2"></div>
    </div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        // המרת טקסט מהגיליון (למשל 18:00) לאובייקט זמן של היום
        function parseSheetTime(str) {
            const match = str.match(/(\d{1,2}):(\d{2})/);
            if (!match) return null;
            const d = new Date();
            d.setHours(parseInt(match[1]), parseInt(match[2]), 0, 0);
            return d;
        }

        function handleData(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const now = new Date();
            
            let sessions = [];
            let currentSession = null;

            // סריקת הגיליון וחלוקה לבלוקים של אימונים
            for (let i = 0; i < rows.length; i++) {
                const cellVal = (rows[i].c && rows[i].c[0]) ? rows[i].c[0].v : "";
                if (typeof cellVal === 'string' && cellVal.includes("אימון")) {
                    if (currentSession) sessions.push(currentSession);
                    currentSession = { 
                        time: parseSheetTime(cellVal), 
                        title: cellVal, 
                        trainees: [] 
                    };
                } else if (currentSession && cellVal && cellVal !== "מתאמנת") {
                    currentSession.trainees.push(rows[i].c);
                }
            }
            if (currentSession) sessions.push(currentSession);

            // בחירת האימון הנכון להצגה לפי חוקי הזמן שלך
            let activeSession = null;

            for (let i = 0; i < sessions.length; i++) {
                const s = sessions[i];
                const nextS = sessions[i+1];
                const start = s.time;
                if (!start) continue;

                if (i === 0) {
                    // אימון ראשון: 30 דק' לפני ועד הבא
                    const preWindow = new Date(start.getTime() - 30 * 60000);
                    const endLimit = nextS ? nextS.time : new Date(start.getTime() + 70 * 60000);
                    if (now >= preWindow && now < endLimit) activeSession = s;
                } 
                else if (i === sessions.length - 1) {
                    // אימון אחרון: מההתחלה ועד 70 דק' אחרי
                    const postWindow = new Date(start.getTime() + 70 * 60000);
                    if (now >= start && now < postWindow) activeSession = s;
                }
                else {
                    // אימון אמצע: מההתחלה ועד האימון הבא (דריסה)
                    if (now >= start && now < nextS.time) activeSession = s;
                }
            }

            renderView(activeSession);
        }

        function renderView(session) {
            const r1 = document.getElementById('row-1');
            const r2 = document.getElementById('row-2');
            const info = document.getElementById('training-info');
            
            if (!session) {
                r1.innerHTML = '<div class="status-msg">STUDIO ALMA - מחוץ לשעות הפעילות</div>';
                r2.innerHTML = '';
                info.innerText = 'ממתין לאימון הבא';
                return;
            }

            info.innerText = session.title;
            r1.innerHTML = ''; r2.innerHTML = '';
            
            session.trainees.slice(0, 6).forEach((trainee, idx) => {
                const name = trainee[0] ? trainee[0].v : "מתאמנת";
                let html = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                
                for (let j = 1; j < trainee.length; j += 3) {
                    const ex = trainee[j] ? trainee[j].v : '';
                    if (ex && ex !== "" && ex !== "...") {
                        const weight = (trainee[j+1] && trainee[j+1].v) ? trainee[j+1].v : '';
                        const reps = (trainee[j+2] && trainee[j+2].v) ? trainee[j+2].v : '';
                        html += `<div class="ex-row">
                                    <div class="ex-text"><span>${ex}</span><span class="weight">${weight}</span></div>
                                    <div class="reps">${reps}</div>
                                 </div>`;
                    }
                }
                html += `</div></div>`;
                
                if (idx < 3) r1.innerHTML += html;
                else r2.innerHTML += html;
            });
        }

        function refresh() {
            const script = document.createElement('script');
            script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=${Date.now()}`;
            document.head.appendChild(script);
            script.onload = () => script.remove();
        }

        setInterval(refresh, 10000);
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('he-IL', {hour12:false});
        }, 1000);
        refresh();
    </script>
</body>
</html>
