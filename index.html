<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alma's Studio - Modern Edition</title>
    <style>
        :root {
            --neon-green: #00ffcc;
            --neon-orange: #ff9f43;
            --dark-bg: #050505;
            --card-bg: #121212;
        }

        * { box-sizing: border-box; }
        
        html, body { 
            height: 100vh; margin: 0; background-color: var(--dark-bg); 
            color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        body { padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px; }

        /* הדר עליון */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(20, 20, 20, 0.95); padding: 15px 30px; border-radius: 20px; 
            border-bottom: 3px solid var(--neon-green); min-height: 90px;
            flex-shrink: 0; position: relative; margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.1);
        }

        .studio-logo { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-main { font-size: 3.2rem; color: #ffd700; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .logo-sub { font-size: 1.1rem; color: var(--neon-green); letter-spacing: 8px; text-transform: uppercase; display: block; font-weight: bold; }
        #time { font-size: 2.2rem; color: var(--neon-green); font-weight: bold; font-variant-numeric: tabular-nums; }

        /* גריד מרכזי - כרטיסיות גדולות */
        #main-grid { 
            display: grid; gap: 25px; width: 100%; 
            flex-grow: 1;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            overflow-y: auto; 
            align-content: start;
            padding: 10px 5px 30px 5px;
        }

        .card { 
            background: var(--card-bg); border: 2px solid #222; border-radius: 30px; 
            padding: 30px; display: flex; flex-direction: column; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            transition: transform 0.3s ease;
        }

        .name { 
            font-size: 3.5rem; color: #ffd700; text-align: center; 
            border-bottom: 2px solid #333; margin-bottom: 20px; 
            padding-bottom: 10px; font-weight: 900;
        }
        
        .ex-row { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 2rem; padding: 12px 0; border-bottom: 1px solid #1a1a1a;
        }
        .weight { color: var(--neon-orange); font-weight: bold; background: rgba(255,159,67,0.1); padding: 2px 12px; border-radius: 8px; }
        .reps { color: var(--neon-green); font-weight: bold; border: 2px solid var(--neon-green); padding: 5px 20px; border-radius: 15px; }

        /* פאנל טיימר מודרני */
        .footer-controls {
            background: #0f0f0f; 
            padding: 20px 40px; 
            border-radius: 35px 35px 0 0; 
            border-top: 4px solid var(--neon-orange);
            display: flex; flex-direction: column; gap: 15px; 
            flex-shrink: 0;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.9);
            margin: 0 -15px; /* נמתח מקצה לקצה */
        }

        #timer-bar-container { width: 100%; height: 12px; background: #222; border-radius: 10px; overflow: hidden; box-shadow: inset 0 0 5px #000; }
        #timer-bar-fill { 
            width: 100%; height: 100%; 
            background: linear-gradient(90deg, #ff6b6b, var(--neon-orange)); 
            box-shadow: 0 0 15px var(--neon-orange);
            transition: width 1s linear; 
        }

        .timer-row { display: flex; justify-content: space-between; align-items: center; }
        
        #timer-display { 
            font-size: 5rem; color: var(--neon-orange); font-weight: 900; 
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255, 159, 67, 0.4);
        }
        
        .btn-group { display: flex; gap: 15px; }
        .btn { 
            border: none; color: white; padding: 15px 35px; border-radius: 20px; 
            cursor: pointer; font-size: 1.4rem; font-weight: 800; 
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .btn-start { 
            background: linear-gradient(135deg, #00816a, #00ffcc); 
            color: #050505;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
        }
        .btn-reset { background: #222; border: 1px solid #444; }
        .btn:active { transform: scale(0.95); }

        #session-label { color: #888; font-weight: bold; font-size: 1.5rem; letter-spacing: 1px; }

        @media (max-width: 800px) {
            #main-grid { grid-template-columns: 1fr; }
            .logo-main { font-size: 2.2rem; }
            #timer-display { font-size: 3.5rem; }
            .footer-controls { padding: 15px 20px; }
            .name { font-size: 2.5rem; }
        }
    </style>
</head>
<body onclick="document.getElementById('finish-sound').load()">

    <div class="header">
        <div id="time">00:00</div>
        <div class="studio-logo">
            <span class="logo-main">Alma's</span>
            <span class="logo-sub">STUDIO</span>
        </div>
        <div style="width: 100px;"></div>
    </div>

    <div id="main-grid"></div>

    <div class="footer-controls">
        <div id="timer-bar-container"><div id="timer-bar-fill"></div></div>
        <div class="timer-row">
            <div id="session-label">WAITING...</div>
            <div id="timer-display">07:00</div>
            <div class="btn-group">
                <button id="start-btn" class="btn btn-start" onclick="toggleTimer(event)">הפעל</button>
                <button class="btn btn-reset" onclick="resetTimer(event)">איפוס</button>
            </div>
        </div>
    </div>

    <audio id="finish-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 
        const TOTAL_TIME = 7 * 60;
        let timeLeft = TOTAL_TIME;
        let timerRunning = false;
        let timerInterval;

        function toggleTimer(event) {
            if (event) event.stopPropagation();
            const btn = document.getElementById('start-btn');
            if (timerRunning) {
                clearInterval(timerInterval);
                btn.innerText = "המשך";
                btn.style.filter = "grayscale(0.5)";
            } else {
                timerInterval = setInterval(updateTimer, 1000);
                btn.innerText = "עצור";
                btn.style.filter = "none";
            }
            timerRunning = !timerRunning;
        }

        function resetTimer(event) {
            if (event) event.stopPropagation();
            clearInterval(timerInterval);
            timerRunning = false;
            timeLeft = TOTAL_TIME;
            document.getElementById('start-btn').innerText = "הפעל";
            document.getElementById('start-btn').style.filter = "none";
            updateTimerDisplay();
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                document.getElementById('finish-sound').play();
                timeLeft = TOTAL_TIME;
            } else { timeLeft--; }
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timer-bar-fill').style.width = (timeLeft / TOTAL_TIME) * 100 + "%";
        }

        function googleDocCallback(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const grid = document.getElementById('main-grid');
            const now = new Date();
            const currentTotalMinutes = now.getHours() * 60 + now.getMinutes();
            let targetSessionRows = [];
            let activeSessionTitle = "";

            for (let i = 0; i < rows.length; i++) {
                const firstCell = rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
                if (firstCell.includes("אימון")) {
                    const timeMatch = firstCell.match(/(\d{1,2}):?(\d{2})?/);
                    if (timeMatch) {
                        const h = parseInt(timeMatch[1]);
                        const m = timeMatch[2] ? parseInt(timeMatch[2]) : 0;
                        const start = h * 60 + m;
                        if (currentTotalMinutes >= start && currentTotalMinutes < (start + 60)) {
                            activeSessionTitle = firstCell;
                            let j = i + 1;
                            while (j < rows.length) {
                                const nextCell = rows[j].c[0] ? rows[j].c[0].v.toString().trim() : "";
                                if (nextCell.includes("אימון") || nextCell === "") break;
                                targetSessionRows.push(rows[j]);
                                j++;
                            }
                        }
                    }
                }
            }

            if (targetSessionRows.length > 0) {
                document.getElementById('session-label').innerText = activeSessionTitle.toUpperCase();
                let html = '';
                targetSessionRows.forEach(row => {
                    const name = row.c[0].v;
                    html += `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                    for (let j = 1; j < row.c.length; j += 3) {
                        const ex = row.c[j] ? row.c[j].v : '';
                        const w = (row.c[j+1] && row.c[j+1].v) ? row.c[j+1].v : '';
                        const r = (row.c[j+2] && row.c[j+2].v) ? row.c[j+2].v : '-';
                        if (ex && ex !== "...") html += `<div class="ex-row"><div>${ex} <span class="weight">${w}</span></div><span class="reps">${r}</span></div>`;
                    }
                    html += `</div></div>`;
                });
                grid.innerHTML = html;
            } else {
                document.getElementById('session-label').innerText = "NO ACTIVE SESSION";
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding-top:100px;color:#333;font-size:3rem;font-weight:900;">OFF-TIME</div>';
            }
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:googleDocCallback&gid=0&tcb=${Date.now()}`;
            document.body.appendChild(s);
        }

        setInterval(refresh, 5000);
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
        refresh();
    </script>
</body>
</html>
