<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alma's Studio - Iron Sync</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100vh; margin: 0; padding: 0; overflow: hidden; background-color: #000; color: white; font-family: system-ui, sans-serif; }
        body { display: flex; flex-direction: column; padding: 10px; padding-top: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 0 30px; border-radius: 15px; border-bottom: 4px solid #00ffcc; height: 10vh; margin-bottom: 15px; position: relative; }
        .studio-logo { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-main { font-size: 2.2rem; color: #ffd700; font-weight: 900; }
        .logo-sub { font-size: 0.7rem; color: #00ffcc; letter-spacing: 4px; display: block; }
        #main-grid { display: grid; gap: 12px; flex-grow: 1; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .card { background: #161616; border: 2px solid #333; border-radius: 20px; padding: 12px; display: flex; flex-direction: column; }
        .name { font-size: 1.8rem; color: #ffd700; text-align: center; border-bottom: 2px solid #444; margin-bottom: 8px; font-weight: 900; }
        .ex-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 1.1rem; border-bottom: 1px solid #222; }
        .reps { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div id="date">מעדכן...</div>
        <div class="studio-logo"><span class="logo-main">Alma's</span><span class="logo-sub">STUDIO</span></div>
        <div id="time" style="font-size: 2rem; color: #00ffcc;">00:00:00</div>
    </div>
    <div id="main-grid"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';

        async function fetchData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tcb=${Date.now()}`;
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;
                
                const grid = document.getElementById('main-grid');
                const now = new Date();
                const currentMin = now.getHours() * 60 + now.getMinutes();
                
                let sessionRows = [];
                let active = false;

                for (let i = 0; i < rows.length; i++) {
                    const rowData = rows[i].c;
                    if (!rowData || !rowData[0]) continue;
                    
                    const firstCell = rowData[0].v ? rowData[0].v.toString() : "";
                    
                    if (firstCell.includes("אימון")) {
                        const timeMatch = firstCell.match(/(\d{1,2}):(\d{2})/);
                        if (timeMatch) {
                            const sTotal = parseInt(timeMatch[1]) * 60 + parseInt(timeMatch[2]);
                            // מציג אם אנחנו בטווח של 30 דקות לפני עד 90 דקות אחרי
                            active = (currentMin >= sTotal - 30 && currentMin <= sTotal + 90);
                            if (active) sessionRows = [];
                        }
                        continue;
                    }

                    if (active && firstCell && isNaN(firstCell)) {
                        sessionRows.push(rowData);
                    }
                }

                grid.innerHTML = '';
                sessionRows.slice(0, 6).forEach(rowData => {
                    const name = rowData[0].v;
                    let html = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                    // סורק את כל העמודות בשורה כדי למצוא תרגילים
                    for (let j = 1; j < rowData.length; j++) {
                        if (rowData[j] && rowData[j].v && isNaN(rowData[j].v)) {
                            const exName = rowData[j].v;
                            const weight = (rowData[j+1] && rowData[j+1].v) ? rowData[j+1].v : "";
                            const reps = (rowData[j+2] && rowData[j+2].v) ? rowData[j+2].v : "";
                            html += `<div class="ex-row"><span>${exName} ${weight}</span><span class="reps">${reps}</span></div>`;
                            j += 2; // קופץ לעמודה הבאה של תרגיל
                        }
                    }
                    grid.innerHTML += html + `</div></div>`;
                });

                document.getElementById('date').innerText = now.toLocaleDateString('he-IL');
            } catch (e) { console.error(e); }
        }

        setInterval(fetchData, 8000);
        setInterval(() => {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString('he-IL');
        }, 1000);
        fetchData();
    </script>
</body>
</html>
