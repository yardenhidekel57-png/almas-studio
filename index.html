<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alma's Studio - TV Edition</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body { 
            height: 100vh; margin: 0; padding: 0;
            overflow: hidden; /* ביטול גלילה כללית */
            background-color: #050505; color: white;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body { 
            display: flex; flex-direction: column; 
            padding: 10px;
            /* מרווח ביטחון מהפס של הדפדפן בטלוויזיה */
            padding-top: 50px; 
        }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #111; padding: 0 30px; border-radius: 15px; 
            border-bottom: 4px solid #00ffcc; height: 10vh; margin-bottom: 10px;
            flex-shrink: 0; position: relative;
        }

        .studio-logo { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-main { font-size: 2.2rem; color: #ffd700; font-weight: 900; letter-spacing: 2px; }
        .logo-sub { font-size: 0.7rem; color: #00ffcc; letter-spacing: 4px; text-transform: uppercase; display: block; margin-top: -5px; }

        #main-grid { 
            display: grid; gap: 12px; flex-grow: 1; 
            width: 100%;
            grid-template-columns: repeat(3, 1fr); /* מקובע ל-3 עמודות */
            grid-template-rows: repeat(2, 1fr);    /* מקובע ל-2 שורות */
            padding-bottom: 30px; /* מרווח מהלייבל למטה */
        }

        .card { 
            background: #161616; border: 2px solid #333; border-radius: 20px; 
            padding: 12px; display: flex; flex-direction: column;
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
            min-height: 0; /* מונע מתיחה של הגריד */
        }

        .name { 
            font-size: clamp(1.4rem, 3.5vh, 2.2rem); color: #ffd700; 
            text-align: center; border-bottom: 2px solid #444; 
            margin-bottom: 8px; padding-bottom: 5px; font-weight: 900;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .ex-list {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: auto; /* גלילה פנימית בלבד אם יש יותר מדי תרגילים */
            scrollbar-width: none; /* הסתרת גלילה ב-Firefox */
        }
        .ex-list::-webkit-scrollbar { display: none; } /* הסתרת גלילה ב-Chrome/TV */

        .ex-row { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: clamp(0.8rem, 2vh, 1.4rem); 
            padding: 6px 0; 
            border-bottom: 1px solid #222;
        }

        .ex-info { display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden; }
        .ex-info span { overflow: hidden; text-overflow: ellipsis; }

        .weight {
            color: #ff9f43; font-weight: bold; background: rgba(255, 159, 67, 0.1);
            padding: 1px 6px; border-radius: 4px; font-size: 0.85em;
        }

        .reps { 
            color: #00ffcc; font-weight: bold; background: rgba(0, 255, 204, 0.1); 
            padding: 1px 10px; border-radius: 6px; flex-shrink: 0;
        }

        #session-label { position: absolute; bottom: 5px; left: 20px; color: #ffd700; font-size: 1rem; font-weight: bold; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">
        <div id="date" style="font-size: 1.1rem;">--/--</div>
        <div class="studio-logo">
            <span class="logo-main">Alma's</span>
            <span class="logo-sub">STUDIO</span>
        </div>
        <div id="time" style="font-size: 2rem; color: #00ffcc; font-weight: bold;">00:00:00</div>
    </div>

    <div id="main-grid"></div>
    <div id="session-label">טוען...</div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function googleDocCallback(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';

            const now = new Date();
            const currentTimeValue = now.getHours() * 100 + now.getMinutes();

            let targetSessionRows = [];
            let currentScanningSession = "";

            for (let i = 0; i < rows.length; i++) {
                const firstCell = rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
                if (firstCell.includes("אימון")) {
                    const sessionTimeNum = parseInt(firstCell.replace(/[^0-9]/g, ""));
                    if (currentTimeValue >= (sessionTimeNum - 45) && currentTimeValue < (sessionTimeNum + 60)) {
                        currentScanningSession = firstCell;
                        targetSessionRows = []; 
                    } else { currentScanningSession = ""; }
                    continue; 
                }
                if (currentScanningSession !== "" && firstCell !== "" && isNaN(firstCell)) {
                    targetSessionRows.push(rows[i]);
                }
            }

            document.getElementById('session-label').innerText = currentScanningSession || "אין אימון קרוב";

            if (targetSessionRows.length > 0) {
                // הצגת מקסימום 6 מתאמנות כדי לשמור על מבנה 3x2
                targetSessionRows.slice(0, 6).forEach(row => {
                    const name = row.c[0].v;
                    let html = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                    
                    for (let j = 1; j < row.c.length; j += 3) {
                        const ex = row.c[j] ? row.c[j].v : '';
                        const weight = (row.c[j+1] && row.c[j+1].v) ? row.c[j+1].v : '';
                        const reps = (row.c[j+2] && row.c[j+2].v) ? row.c[j+2].v : '-';
                        if (ex && ex !== "" && ex !== "...") {
                            html += `<div class="ex-row"><div class="ex-info"><span>${ex}</span> ${weight ? `<span class="weight">${weight}</span>` : ''}</div><span class="reps">${reps}</span></div>`;
                        }
                    }
                    html += `</div></div>`;
                    grid.innerHTML += html;
                });
            }
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:googleDocCallback&gid=0&tcb=${Date.now()}`;
            document.body.appendChild(s);
        }

        function clock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('he-IL', {weekday:'long', day:'numeric', month:'numeric'});
        }

        setInterval(refresh, 10000); // רענון נתונים כל 10 שניות
        setInterval(clock, 1000);
        refresh(); clock();
    </script>
</body>
</html>
