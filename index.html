<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alma's Studio - 50 Inch Professional</title>
    <style>
        * { box-sizing: border-box; }
        html, body { 
            height: 100vh; margin: 0; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 1.5vh; }

        /* כותרת */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #111; padding: 0 40px; border-radius: 20px; 
            border-bottom: 5px solid #00ffcc; height: 10vh; margin-bottom: 2vh;
            flex-shrink: 0;
        }
        .studio-logo { text-align: center; flex-grow: 1; }
        .logo-main { font-size: 3.5rem; color: #ffd700; font-weight: 900; display: block; line-height: 1; }
        .logo-sub { font-size: 1rem; color: #00ffcc; letter-spacing: 8px; text-transform: uppercase; }

        /* גריד קשיח למניעת חפיפות */
        #main-grid { 
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(2, 1fr);
            gap: 20px; 
            flex-grow: 1;
            height: 85vh; /* מגביל את כל הגריד לשטח הנותר */
        }

        .card { 
            background: #161616; 
            border: 2px solid #333; 
            border-radius: 25px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            max-height: 40vh; /* מבטיח שהכרטיסייה לא תגדל מעבר לחצי מסך */
            overflow: hidden;
        }

        .name { 
            font-size: 3rem; color: #ffd700; text-align: center; 
            border-bottom: 2px solid #444; margin-bottom: 10px; 
            padding-bottom: 8px; font-weight: 900;
            flex-shrink: 0;
        }

        /* רשימת תרגילים עם גלילה פנימית אם יש עומס */
        .ex-list {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* עיצוב פס גלילה שיהיה נקי */
        .ex-list::-webkit-scrollbar { width: 5px; }
        .ex-list::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .ex-row { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.8rem; padding: 10px 0; 
            border-bottom: 1px solid #222;
        }

        .reps-box {
            background: rgba(0, 255, 204, 0.1); 
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 12px;
            padding: 4px 15px;
            color: #00ffcc;
            font-weight: 900;
            font-size: 1.6rem;
            min-width: 120px;
            text-align: center;
        }
        
        .weight-tag { color: #ff9f43; font-weight: bold; margin-right: 10px; font-size: 1.4rem; }

        /* התאמה ל-5 מתאמנות: האחרונות יתמרכזו */
        #main-grid > div:nth-child(4) { grid-column: 1 / 2; }
        #main-grid > div:nth-child(5) { grid-column: 2 / 3; }
    </style>
</head>
<body>

    <div class="header">
        <div id="date" style="font-size: 2rem; color: #888;">--/--</div>
        <div class="studio-logo">
            <span class="logo-main">Alma's</span>
            <span class="logo-sub">STUDIO</span>
        </div>
        <div id="time" style="font-size: 3rem; color: #00ffcc; font-weight: 900;">00:00:00</div>
    </div>

    <div id="main-grid"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function handleData(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const grid = document.getElementById('main-grid');
            let content = '';
            let count = 0;

            for (let i = 0; i < rows.length && count < 6; i++) {
                const r = rows[i].c;
                if (!r || !r[0] || !r[0].v) continue;
                
                const name = r[0].v.toString().trim();
                if (name === "" || name.includes("אימון") || name === "מתאמנת") continue;

                let cardHtml = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                
                for (let j = 1; j < r.length; j += 3) {
                    const ex = r[j] ? r[j].v : '';
                    if (ex && ex !== "" && ex !== "...") {
                        const w = (r[j+1] && r[j+1].v) ? r[j+1].v : '';
                        const reps = (r[j+2] && r[j+2].v) ? r[j+2].v : '';
                        cardHtml += `<div class="ex-row">
                                        <div><span>${ex}</span> <span class="weight-tag">${w}</span></div>
                                        <div class="reps-box">${reps}</div>
                                     </div>`;
                    }
                }
                cardHtml += `</div></div>`;
                content += cardHtml;
                count++;
            }
            grid.innerHTML = content;
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=${Date.now()}`;
            document.head.appendChild(s);
            s.onload = () => s.remove();
        }

        setInterval(refresh, 10000);
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('he-IL');
            document.getElementById('date').innerText = now.toLocaleDateString('he-IL', {day:'numeric', month:'numeric'});
        }, 1000);

        refresh();
    </script>
</body>
</html>
