<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO ALMA - 50 Inch Optimized</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 1.5vh; }

        .header { 
            height: 8vh; background: #111; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 3vw; border-bottom: 0.5vh solid #ff6600; border-radius: 1.5vh;
            margin-bottom: 1.5vh; flex-shrink: 0;
        }
        .logo-main { font-size: 4.5vh; color: #ff6600; font-weight: 900; letter-spacing: 2px; }
        #time { font-size: 4.5vh; color: #00ffcc; font-weight: 900; }
        #training-info { font-size: 2.8vh; color: #ff6600; font-weight: bold; }

        #container { 
            flex-grow: 1;
            display: flex; 
            flex-direction: column;
            gap: 2vh;
        }

        .row {
            display: flex;
            flex: 1;
            gap: 2vw;
            justify-content: center;
            align-items: stretch;
        }

        .card { 
            background: #161616; border: 0.3vh solid #333; border-radius: 2.5vh; 
            display: flex; flex-direction: column; 
            flex: 1; 
            padding: 2.5vh; 
            overflow: hidden;
            box-shadow: 0 1vh 3vh rgba(0,0,0,0.5);
        }

        .name { 
            font-size: 5vh; color: #ff6600; text-align: center; 
            border-bottom: 0.3vh solid #444; margin-bottom: 1.5vh; font-weight: 900;
            flex-shrink: 0; padding-bottom: 1vh;
        }

        .ex-list { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-evenly; 
            min-height: 0; 
        }

        .ex-row { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #222; 
            padding: 1vh 0;
            min-height: 0; 
        }

        .ex-text { 
            font-size: clamp(2vh, 3.5vh, 5vh); 
            font-weight: 700; 
            overflow: hidden; 
            white-space: nowrap; 
            text-overflow: ellipsis; 
            max-width: 70%;
        }

        .reps { 
            color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); 
            padding: 0.8vh 2vw; border-radius: 1.2vh; border: 0.2vh solid #00ffcc; 
            font-size: clamp(2vh, 3vh, 4.5vh); 
            min-width: 8vw; text-align: center; 
        }
        
        .weight { color: #ff9f43; font-weight: bold; font-size: 0.8em; margin-right: 1vw; }
        
        .status-msg { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 6vh; color: #444; font-weight: 900; }
    </style>
</head>
<body>

    <div class="header">
        <div id="training-info">מעדכן...</div>
        <div class="logo-main">STUDIO ALMA</div>
        <div id="time">00:00:00</div>
    </div>

    <div id="container"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function parseSheetTime(str) {
            const match = str.match(/(\d{1,2}):(\d{2})/);
            if (!match) return null;
            const d = new Date();
            d.setHours(parseInt(match[1]), parseInt(match[2]), 0, 0);
            return d;
        }

        function handleData(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const now = new Date();
            let sessions = [];
            let currentSession = null;

            for (let i = 0; i < rows.length; i++) {
                const cellVal = (rows[i].c && rows[i].c[0]) ? rows[i].c[0].v : "";
                if (typeof cellVal === 'string' && cellVal.includes("אימון")) {
                    if (currentSession) sessions.push(currentSession);
                    currentSession = { time: parseSheetTime(cellVal), title: cellVal, trainees: [] };
                } else if (currentSession && cellVal && cellVal !== "מתאמנת") {
                    currentSession.trainees.push(rows[i].c);
                }
            }
            if (currentSession) sessions.push(currentSession);

            let activeSession = null;
            for (let i = 0; i < sessions.length; i++) {
                const s = sessions[i];
                const nextS = sessions[i+1];
                if (!s.time) continue;

                const startTime = s.time;
                // הצגה של בדיוק שעה אחת (60 דקות) מתחילת האימון
                const endTime = nextS ? nextS.time : new Date(s.time.getTime() + 60 * 60000);

                if (now >= startTime && now < endTime) {
                    activeSession = s;
                    break;
                }
            }
            renderView(activeSession);
        }

        function renderView(session) {
            const container = document.getElementById('container');
            const info = document.getElementById('training-info');
            
            if (!session || session.trainees.length === 0) {
                container.innerHTML = '<div class="status-msg">אין אימון פעיל כרגע</div>';
                info.innerText = 'הפסקה';
                return;
            }

            info.innerText = session.title;
            const trainees = session.trainees;
            container.innerHTML = '';

            const numTrainees = trainees.length;
            const maxPerRow = numTrainees <= 3 ? numTrainees : Math.ceil(numTrainees / 2);
            
            let rowDiv = document.createElement('div');
            rowDiv.className = 'row';

            trainees.forEach((trainee, index) => {
                if (index > 0 && index % maxPerRow === 0) {
                    container.appendChild(rowDiv);
                    rowDiv = document.createElement('div');
                    rowDiv.className = 'row';
                }

                const name = trainee[0] ? trainee[0].v : "מתאמנת";
                let exercisesHtml = "";
                for (let j = 1; j < trainee.length; j += 3) {
                    const ex = trainee[j] ? trainee[j].v : '';
                    if (ex && ex !== "" && ex !== "...") {
                        const w = (trainee[j+1] && trainee[j+1].v) ? trainee[j+1].v : '';
                        const r = (trainee[j+2] && trainee[j+2].v) ? trainee[j+2].v : '';
                        exercisesHtml += `<div class="ex-row">
                            <div class="ex-text"><span>${ex}</span><span class="weight">${w}</span></div>
                            <div class="reps">${r}</div>
                        </div>`;
                    }
                }
                rowDiv.innerHTML += `<div class="card"><div class="name">${name}</div><div class="ex-list">${exercisesHtml}</div></div>`;
            });
            container.appendChild(rowDiv);
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=${Date.now()}`;
            document.head.appendChild(s);
            s.onload = () => s.remove();
        }

        setInterval(refresh, 10000);
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('he-IL', {hour12:false});
        }, 1000);
        refresh();
    </script>
</body>
</html>
