<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ALMA'S STUDIO</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* מבטל גלילה לגמרי */
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* מרווח ביטחון מהפס של הדפדפן */
        .top-spacer {
            height: 100px;
            width: 100%;
        }

        h1 {
            font-size: 50px;
            margin: 10px 0;
            text-align: center;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 15px;
        }

        .row {
            display: flex;
            flex: 1;
            gap: 15px;
        }

        .card {
            flex: 1;
            background: #111;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 15px;
            text-align: right;
            display: flex;
            flex-direction: column;
        }

        .name {
            font-size: 30px;
            font-weight: bold;
            border-bottom: 2px solid #444;
            margin-bottom: 10px;
            text-align: center;
            padding-bottom: 5px;
        }

        .list {
            font-size: 22px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="top-spacer"></div>

    <h1>ALMA'S STUDIO</h1>

    <div class="main-content">
        <div class="row">
            <div class="card">
                <div class="name">מתאמנת 3</div>
                <div class="list"><div>• תרגיל 1</div><div>• תרגיל 2</div></div>
            </div>
            <div class="card">
                <div class="name">מתאמנת 2</div>
                <div class="list"><div>• תרגיל 1</div><div>• תרגיל 2</div></div>
            </div>
            <div class="card">
                <div class="name">מתאמנת 1</div>
                <div class="list"><div>• תרגיל 1</div><div>• תרגיל 2</div></div>
            </div>
        </div>

        <div class="row">
            <div class="card">
                <div class="name">מתאמנת 6</div>
                <div class="list"><div>• תרגיל 1</div><div>• תרגיל 2</div></div>
            </div>
            <div class="card">
                <div class="name">מתאמנת 5</div>
                <div class="list"><div>• תרגיל 1</div><div>• תרגיל 2</div></div>
            </div>
            <div class="card">
                <div class="name">מתאמנת 4</div>
                <div class="list"><div>• תרגיל 1</div><div>• תרגיל 2</div></div>
            </div>
        </div>
    </div>

</body>
</html>
