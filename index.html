<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ALMA'S STUDIO - LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Assistant', sans-serif;
            margin: 0;
            padding: 20px;
            padding-top: 80px; /* המרווח שביקשת מהפס העליון */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* מונע גלילה במחשב ובטלוויזיה */
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        #workout-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 כרטיסיות בשורה */
            grid-template-rows: repeat(2, 1fr);    /* 2 שורות */
            gap: 20px;
            width: 95%;
            max-width: 1600px;
            height: calc(100vh - 200px);
        }
        .card {
            background: #111;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .trainee-name {
            font-size: 1.8rem;
            font-weight: 700;
            border-bottom: 2px solid #444;
            margin-bottom: 15px;
            padding-bottom: 10px;
            text-align: center;
        }
        .exercise-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: right;
            font-size: 1.4rem;
            line-height: 1.4;
        }
        .exercise-item {
            margin-bottom: 8px;
            position: relative;
            padding-right: 20px;
        }
        .exercise-item::before {
            content: "•";
            position: absolute;
            right: 0;
            color: #777;
        }
    </style>
</head>
<body>

    <h1>ALMA'S STUDIO</h1>
    <div id="workout-grid">טוען נתונים...</div>

    <script>
        const sheetId = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';
        const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        async function fetchData() {
            try {
                const res = await fetch(base);
                const text = await res.text();
                // הניקוי של גוגל
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const grid = document.getElementById('workout-grid');
                grid.innerHTML = '';

                // מושך את 6 השורות הראשונות
                jsonData.table.rows.slice(0, 6).forEach((row) => {
                    const name = row.c[0] ? row.c[0].v : 'מתאמנת';
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let exercisesHtml = '';
                    for (let i = 1; i < row.c.length; i++) {
                        if (row.c[i] && row.c[i].v) {
                            exercisesHtml += `<div class="exercise-item">${row.c[i].v}</div>`;
                        }
                    }

                    card.innerHTML = `
                        <div class="trainee-name">${name}</div>
                        <div class="exercise-list">${exercisesHtml}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('workout-grid').innerText = "שגיאה בחיבור לגיליון. וודאי שהוא ציבורי (Anyone with the link can view).";
            }
        }

        fetchData();
        setInterval(fetchData, 60000); // עדכון אוטומטי כל דקה
    </script>
</body>
</html>
