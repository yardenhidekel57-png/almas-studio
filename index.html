<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALMA'S STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* מבטל גלילה לגמרי */
            background-color: #000;
            color: #fff;
            font-family: 'Assistant', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* המרווח מלמעלה שימנע מהפס להסתיר את הכותרת */
            padding-top: 100px; 
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin: 0 0 20px 0;
            color: #fff;
            text-transform: uppercase;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 בטור */
            grid-template-rows: repeat(2, 1fr);    /* 2 בשורה */
            gap: 15px;
            width: 95%;
            height: calc(100vh - 200px); /* מתאים את הגובה שנשאר למסך */
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .trainee-name {
            font-size: 2rem;
            font-weight: 700;
            border-bottom: 1px solid #444;
            margin-bottom: 10px;
            padding-bottom: 5px;
            text-align: center;
        }

        .exercise-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: right;
        }

        .exercise-item {
            font-size: 1.5rem;
            margin-bottom: 8px;
            padding-right: 15px;
            position: relative;
        }

        .exercise-item::before {
            content: "•";
            position: absolute;
            right: 0;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>ALMA'S STUDIO</h1>

    <div class="grid-container">
        <div class="card"><div class="trainee-name">מתאמנת 1</div><ul class="exercise-list"><li class="exercise-item">תרגיל 1</li><li class="exercise-item">תרגיל 2</li></ul></div>
        <div class="card"><div class="trainee-name">מתאמנת 2</div><ul class="exercise-list"><li class="exercise-item">תרגיל 1</li><li class="exercise-item">תרגיל 2</li></ul></div>
        <div class="card"><div class="trainee-name">מתאמנת 3</div><ul class="exercise-list"><li class="exercise-item">תרגיל 1</li><li class="exercise-item">תרגיל 2</li></ul></div>
        
        <div class="card"><div class="trainee-name">מתאמנת 4</div><ul class="exercise-list"><li class="exercise-item">תרגיל 1</li><li class="exercise-item">תרגיל 2</li></ul></div>
        <div class="card"><div class="trainee-name">מתאמנת 5</div><ul class="exercise-list"><li class="exercise-item">תרגיל 1</li><li class="exercise-item">תרגיל 2</li></ul></div>
        <div class="card"><div class="trainee-name">מתאמנת 6</div><ul class="exercise-list"><li class="exercise-item">תרגיל 1</li><li class="exercise-item">תרגיל 2</li></ul></div>
    </div>

</body>
</html>
