<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMA'S STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Assistant', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 40px;
            letter-spacing: 5px;
            text-align: center;
        }

        #workout-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1400px;
        }

        .card {
            background: #111;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 30px;
            transition: transform 0.3s ease;
        }

        .trainee-name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 1px solid #444;
            padding-bottom: 15px;
            text-align: center;
        }

        .exercise-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: right;
        }

        .exercise-item {
            font-size: 1.8rem;
            margin-bottom: 15px;
            padding-right: 25px;
            position: relative;
        }

        .exercise-item::before {
            content: "•";
            position: absolute;
            right: 0;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>ALMA'S STUDIO</h1>
    <div id="workout-grid">טוען נתונים...</div>

    <script>
        const sheetId = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';
        const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        async function init() {
            try {
                const res = await fetch(base);
                const text = await res.text();
                const data = JSON.parse(text.substr(47).slice(0, -2));
                
                const grid = document.getElementById('workout-grid');
                grid.innerHTML = '';

                data.table.rows.forEach((row) => {
                    const name = row.c[0] ? row.c[0].v : '';
                    if (!name) return;

                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let exercisesHtml = '';
                    // עובר על התרגילים בעמודות
                    for (let i = 1; i < row.c.length; i++) {
                        if (row.c[i] && row.c[i].v && typeof row.c[i].v === 'string') {
                            exercisesHtml += `<li class="exercise-item">${row.c[i].v}</li>`;
                        }
                    }

                    card.innerHTML = `
                        <div class="trainee-name">${name}</div>
                        <ul class="exercise-list">${exercisesHtml}</ul>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('workout-grid').innerHTML = 'שגיאה בטעינת הנתונים';
            }
        }

        init();
        // רענון אוטומטי כל דקה
        setInterval(init, 60000);
    </script>
</body>
</html>
