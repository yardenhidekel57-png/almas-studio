<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alma Studio - Synchronized Pro</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background: #000; color: white; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        
        .app-wrapper { 
            display: flex; flex-direction: column; 
            height: 100vh; height: -webkit-fill-available;
            padding: 10px 15px env(safe-area-inset-bottom);
        }

        /* הדר עליון */
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; background: #111; border-radius: 20px; 
            border-bottom: 3px solid #00ffcc; margin-bottom: 15px; flex-shrink: 0;
        }
        .main-title { font-size: 3rem; color: #ffd700; font-weight: 900; line-height: 0.8; text-align: center; }
        .sub-title { font-size: 1rem; color: #00ffcc; letter-spacing: 5px; display: block; font-weight: bold; }
        #live-clock { font-size: 2.2rem; font-weight: bold; color: #00ffcc; }

        /* גריד מתאמנים - כרטיסיות גדולות */
        .workout-content { 
            flex-grow: 1; overflow-y: auto; display: grid; gap: 20px; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            padding-bottom: 220px; 
            align-content: start;
        }

        .trainee-card { 
            background: #181818; border-radius: 35px; padding: 35px; 
            border: 2px solid #282828; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .trainee-name { 
            font-size: 3.8rem; color: #ffd700; text-align: center; 
            margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; font-weight: 800;
        }
        .exercise-row { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 2.2rem; padding: 15px 0; border-bottom: 1px solid #222;
        }
        .val-w { color: #ff9f43; font-weight: bold; }
        .val-r { color: #00ffcc; font-weight: bold; border: 2px solid #00ffcc; padding: 5px 20px; border-radius: 15px; }

        /* פאנל טיימר צף ומסונכרן */
        .sync-timer-panel { 
            position: fixed; bottom: 20px; left: 15px; right: 15px; 
            background: rgba(15, 15, 15, 0.98); backdrop-filter: blur(15px); 
            border: 2px solid #333; border-top: 5px solid #ff9f43; 
            border-radius: 40px; padding: 25px; 
            box-shadow: 0 -15px 60px rgba(0,0,0,0.9); z-index: 1000;
        }

        .bar-container { width: 100%; height: 14px; background: #222; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff9f43, #ff4500); transition: width 1s linear; }
        
        .timer-info-row { display: flex; justify-content: space-between; align-items: center; }
        #display-timer { font-size: 5.5rem; font-weight: 900; color: #ff9f43; font-variant-numeric: tabular-nums; text-shadow: 0 0 20px rgba(255,159,67,0.3); }
        #session-info { color: #ffd700; font-size: 1.8rem; font-weight: bold; }

        @media (max-width: 600px) {
            .main-title { font-size: 2rem; }
            #display-timer { font-size: 3.8rem; }
            .workout-content { grid-template-columns: 1fr; minmax(300px, 1fr); }
            .trainee-name { font-size: 2.8rem; }
            .exercise-row { font-size: 1.8rem; }
        }
    </style>
</head>
<body onclick="document.getElementById('beep').load()">

<div class="app-wrapper">
    <div class="top-nav">
        <div id="live-clock">00:00</div>
        <div class="logo-wrap"><div class="main-title">Alma's<span class="sub-title">STUDIO</span></div></div>
        <div style="width: 80px;"></div>
    </div>

    <div id="main-grid" class="workout-content"></div>

    <div class="sync-timer-panel">
        <div class="bar-container"><div id="fill" class="bar-fill"></div></div>
        <div class="timer-info-row">
            <div id="session-info">מעדכן נתונים...</div>
            <div id="display-timer">07:00</div>
            <div style="color: #444; font-size: 1.2rem; font-weight: bold; letter-spacing: 2px;">SYNC ON</div>
        </div>
    </div>
</div>

<audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';
    const MAX_SECONDS = 7 * 60;
    let lastKnownState = "";

    function updateTimerDisplay(remaining) {
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        document.getElementById('display-timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        document.getElementById('fill').style.width = (remaining / MAX_SECONDS) * 100 + "%";
        
        if (remaining === 0 && lastKnownState === "START") {
            document.getElementById('beep').play();
        }
    }

    function processSheetData(data) {
        if (!data || !data.table) return;
        const rows = data.table.rows;

        // סנכרון לפי תאים Z1 ו-Z2 (עמודה 25)
        const state = rows[0].c[25] ? rows[0].c[25].v.toString().toUpperCase() : "RESET";
        const startTimeStr = rows[1].c[25] ? rows[1].c[25].v.toString() : null;

        if (state === "START" && startTimeStr) {
            const parts = startTimeStr.split(':');
            const now = new Date();
            const startDate = new Date();
            // הגדרת שעת ההתחלה מהגיליון
            startDate.setHours(parseInt(parts[0]), parseInt(parts[1]), parts[2] ? parseInt(parts[2]) : 0);

            const elapsedSeconds = Math.floor((now - startDate) / 1000);
            const remaining = Math.max(0, MAX_SECONDS - elapsedSeconds);
            updateTimerDisplay(remaining);
        } else {
            updateTimerDisplay(MAX_SECONDS);
        }
        
        lastKnownState = state;
        renderWorkoutCards(rows);
    }

    function renderWorkoutCards(rows) {
        const grid = document.getElementById('main-grid');
        const now = new Date();
        const currentTotalMins = now.getHours() * 60 + now.getMinutes();
        let targetRows = [];
        let activeTitle = "";

        for (let i = 0; i < rows.length; i++) {
            const firstCell = rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
            if (firstCell.includes("אימון")) {
                const timeMatch = firstCell.match(/(\d{1,2}):?(\d{2})?/);
                if (timeMatch) {
                    const h = parseInt(timeMatch[1]);
                    const m = timeMatch[2] ? parseInt(timeMatch[2]) : 0;
                    const startMins = h * 60 + m;
                    
                    if (currentTotalMins >= startMins && currentTotalMins < (startMins + 60)) {
                        activeTitle = firstCell;
                        let j = i + 1;
                        while (j < rows.length && rows[j].c[0] && !rows[j].c[0].v.includes("אימון")) {
                            targetRows.push(rows[j]);
                            j++;
                        }
                    }
                }
            }
        }

        if (targetRows.length > 0) {
            document.getElementById('session-info').innerText = activeTitle;
            grid.innerHTML = targetRows.map(row => {
                const name = row.c[0].v;
                let exerciseHtml = '';
                for (let k = 1; k < row.c.length; k += 3) {
                    const ex = row.c[k] ? row.c[k].v : '';
                    const weight = (row.c[k+1] && row.c[k+1].v) ? row.c[k+1].v : '';
                    const reps = (row.c[k+2] && row.c[k+2].v) ? row.c[k+2].v : '-';
                    if (ex && ex !== "...") {
                        exerciseHtml += `
                            <div class="exercise-row">
                                <div>${ex} <span class="val-w">${weight}</span></div>
                                <span class="val-r">${reps}</span>
                            </div>`;
                    }
                }
                return `<div class="trainee-card"><div class="trainee-name">${name}</div>${exerciseHtml}</div>`;
            }).join('');
        } else {
            document.getElementById('session-info').innerText = "מוכן לאימון";
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding-top:100px;color:#222;font-size:4.5rem;font-weight:900;">ALMA STUDIO</div>';
        }
    }

    function fetchData() {
        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:processSheetData&gid=0&tcb=${Date.now()}`;
        document.body.appendChild(script);
    }

    // בדיקת נתונים כל 3 שניות
    setInterval(fetchData, 3000);
    // עדכון השעון העליון
    setInterval(() => {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
    }, 1000);
    
    fetchData();
</script>
</body>
</html>
