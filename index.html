<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>STUDIO ALMA TV</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; line-height: 1.05; }
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: #000; color: white; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; padding: 2px; }
        .header { height: 45px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 3px solid #ff6600; margin-bottom: 5px; flex-shrink: 0; position: relative; }
        .logo-main { font-size: 26px; color: #ff6600; font-weight: 900; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #time { font-size: 24px; color: #00ffcc; font-weight: 900; }
        #training-info { font-size: 16px; color: #ff6600; font-weight: bold; }
        #container { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .row { display: flex; flex: 1; gap: 4px; justify-content: center; align-items: stretch; max-height: 47%; }
        .card { background: #111; border: 1.5px solid #333; border-radius: 10px; display: flex; flex-direction: column; flex: 1; padding: 6px; overflow: hidden; }
        .name { font-size: 22px; color: #ff6600; text-align: center; border-bottom: 2px solid #444; margin-bottom: 3px; font-weight: 900; padding-bottom: 2px; }
        .ex-list { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        .ex-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; height: 16%; padding: 0; }
        .ex-text { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; }
        .reps { color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); padding: 2px 6px; border-radius: 4px; border: 1.5px solid #00ffcc; font-size: 16px; min-width: 75px; text-align: center; }
        .weight { color: #ff9f43; font-weight: bold; font-size: 14px; margin-right: 4px; }
        .footer-credit { height: 20px; font-size: 11px; color: #555; text-align: left; padding: 0 10px; font-family: Arial; }
    </style>
</head>
<body>
    <div class="header">
        <div id="training-info">מתחבר לגיליון...</div>
        <div class="logo-main">STUDIO ALMA</div>
        <div id="time">00:00:00</div>
    </div>
    <div id="container"></div>
    <div class="footer-credit">Developed by Gal E</div>

    <script>
        var SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function handleData(data) {
            if (!data || !data.table) return;
            var rows = data.table.rows;
            var now = new Date();
            var nowMin = (now.getHours() * 60) + now.getMinutes();
            var sessions = [];
            var currentSession = null;

            for (var i = 0; i < rows.length; i++) {
                var cell = (rows[i].c && rows[i].c[0]) ? rows[i].c[0].v : "";
                if (typeof cell === 'string' && cell.indexOf("אימון") !== -1) {
                    var timeMatch = cell.match(/(\d{1,2}):(\d{2})/);
                    if (timeMatch) {
                        var sMin = (parseInt(timeMatch[1]) * 60) + parseInt(timeMatch[2]);
                        if (currentSession) sessions.push(currentSession);
                        currentSession = { start: sMin, title: cell, trainees: [] };
                    }
                } else if (currentSession && cell && cell !== "מתאמנת") {
                    currentSession.trainees.push(rows[i].c);
                }
            }
            if (currentSession) sessions.push(currentSession);

            var active = null;
            for (var j = 0; j < sessions.length; j++) {
                var s = sessions[j];
                var next = sessions[j+1];
                // מציג 60 דקות לפני ועד 120 דקות אחרי (או עד האימון הבא)
                var startLimit = s.start - 60;
                var endLimit = next ? next.start : s.start + 120;

                if (nowMin >= startLimit && nowMin < endLimit) {
                    active = s;
                    break;
                }
            }

            var container = document.getElementById('container');
            var info = document.getElementById('training-info');
            
            if (!active) {
                container.innerHTML = '<div style="text-align:center;font-size:24px;margin-top:15%;color:#666;">לא נמצא אימון פעיל בטווח השעות הקרוב</div>';
                info.innerText = 'הפסקה';
                return;
            }

            info.innerText = active.title;
            container.innerHTML = '';
            var trainees = active.trainees;
            if (trainees.length === 0) return;

            var max = trainees.length <= 3 ? trainees.length : Math.ceil(trainees.length / 2);
            var rowDiv = document.createElement('div');
            rowDiv.className = 'row';

            for (var k = 0; k < trainees.length; k++) {
                if (k > 0 && k % max === 0) {
                    container.appendChild(rowDiv);
                    rowDiv = document.createElement('div');
                    rowDiv.className = 'row';
                }
                var t = trainees[k];
                var exHtml = "";
                for (var m = 1; m < t.length; m += 3) {
                    var ex = (t[m] && t[m].v) ? t[m].v : '';
                    if (ex && ex !== "...") {
                        var w = (t[m+1] && t[m+1].v) ? t[m+1].v : '';
                        var r = (t[m+2] && t[m+2].v) ? t[m+2].v : '';
                        exHtml += '<div class="ex-row"><div class="ex-text"><span>'+ex+'</span><span class="weight">'+w+'</span></div><div class="reps">'+r+'</div></div>';
                    }
                }
                var card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = '<div class="name">'+(t[0]?t[0].v:"")+'</div><div class="ex-list">'+exHtml+'</div>';
                rowDiv.appendChild(card);
            }
            container.appendChild(rowDiv);
        }

        function refresh() {
            var s = document.createElement('script');
            s.src = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=' + Date.now();
            document.head.appendChild(s);
            s.onload = function() { if (s.parentNode) s.parentNode.removeChild(s); };
        }

        setInterval(refresh, 10000);
        setInterval(function() {
            var d = new Date();
            var h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
            document.getElementById('time').innerText = (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
        }, 1000);
        refresh();
    </script>
</body>
</html>
