<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO ALMA - Smart Timing</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: system-ui, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 1vh; }

        .header { 
            height: 8vh; background: #111; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 3vw; border-bottom: 0.4vh solid #ff6600; border-radius: 1.5vh;
            margin-bottom: 1vh; flex-shrink: 0;
        }
        .logo-main { font-size: 4.5vh; color: #ff6600; font-weight: 900; letter-spacing: 2px; }
        #time { font-size: 4.5vh; color: #00ffcc; font-weight: 900; }
        #training-label { font-size: 2.5vh; color: #ff6600; font-weight: bold; }

        #container { height: 88vh; display: flex; flex-direction: column; gap: 1.5vh; }
        .row { display: flex; height: 43vh; gap: 1.5vw; justify-content: center; }

        .card { 
            background: #161616; border: 0.2vh solid #333; border-radius: 2vh; 
            display: flex; flex-direction: column; flex: 1;
            padding: 1.5vh; overflow: hidden; max-width: 31vw;
        }

        .name { 
            font-size: 3.8vh; color: #ff6600; text-align: center; 
            border-bottom: 0.2vh solid #444; margin-bottom: 0.8vh; font-weight: 900;
            flex-shrink: 0; padding-bottom: 0.5vh;
        }

        .ex-list { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; min-height: 0; }
        .ex-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; flex: 1; min-height: 0; }
        .ex-text { font-size: clamp(1.2vh, 2.4vh, 3.5vh); font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .reps { color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); padding: 0.3vh 1.2vw; border-radius: 0.8vh; border: 0.15vh solid #00ffcc; font-size: clamp(1.2vh, 2.1vh, 3vh); min-width: 6.5vw; text-align: center; }
        .weight { color: #ff9f43; font-weight: bold; font-size: 0.85em; margin-right: 0.8vw; }
        
        .no-data { display: flex; justify-content: center; align-items: center; height: 100%; font-size: 5vh; color: #444; }
    </style>
</head>
<body>

    <div class="header">
        <div id="training-label">ממתין לאימון...</div>
        <div class="logo-main">STUDIO ALMA</div>
        <div id="time">00:00:00</div>
    </div>

    <div id="container">
        <div class="row" id="row-1"></div>
        <div class="row" id="row-2"></div>
    </div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function parseTime(timeStr) {
            const match = timeStr.match(/(\d{1,2}):(\d{2})/);
            if (!match) return null;
            const now = new Date();
            return new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(match[1]), parseInt(match[2]), 0);
        }

        function handleData(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const now = new Date();
            
            // 1. שלב זיהוי האימונים והזמנים שלהם
            let allTrainings = [];
            let currentBlock = null;

            for (let i = 0; i < rows.length; i++) {
                const firstCell = rows[i].c && rows[i].c[0] ? rows[i].c[0].v : "";
                if (typeof firstCell === 'string' && firstCell.includes("אימון")) {
                    if (currentBlock) allTrainings.push(currentBlock);
                    currentBlock = { time: parseTime(firstCell), label: firstCell, trainees: [] };
                } else if (currentBlock && firstCell && firstCell !== "מתאמנת") {
                    currentBlock.trainees.push(rows[i].c);
                }
            }
            if (currentBlock) allTrainings.push(currentBlock);

            // 2. שלב בחירת האימון להצגה לפי הכללים
            let trainingToDisplay = null;

            for (let i = 0; i < allTrainings.length; i++) {
                const t = allTrainings[i];
                const nextT = allTrainings[i+1];
                const startTime = t.time;
                
                if (!startTime) continue;

                if (i === 0) { 
                    // אימון ראשון: 30 דק' לפני ועד הבא
                    const showFrom = new Date(startTime.getTime() - 30 * 60000);
                    const showUntil = nextT ? nextT.time : new Date(startTime.getTime() + 70 * 60000);
                    if (now >= showFrom && now < showUntil) trainingToDisplay = t;
                } 
                else if (i === allTrainings.length - 1) {
                    // אימון אחרון: מההתחלה ועד 70 דק' אחרי
                    const showUntil = new Date(startTime.getTime() + 70 * 60000);
                    if (now >= startTime && now < showUntil) trainingToDisplay = t;
                }
                else {
                    // אימוני אמצע: מההתחלה ועד הבא
                    if (now >= startTime && now < nextT.time) trainingToDisplay = t;
                }
            }

            // 3. שלב הרינדור
            render(trainingToDisplay);
        }

        function render(training) {
            const row1 = document.getElementById('row-1');
            const row2 = document.getElementById('row-2');
            const label = document.getElementById('training-label');
            
            if (!training) {
                row1.innerHTML = '<div class="no-data">אין אימון פעיל כרגע</div>';
                row2.innerHTML = '';
                label.innerText = 'STUDIO ALMA';
                return;
            }

            label.innerText = training.label;
            row1.innerHTML = ''; row2.innerHTML = '';
            
            training.trainees.slice(0, 6).forEach((r, index) => {
                const name = r[0] ? r[0].v : "";
                let html = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                
                for (let j = 1; j < r.length; j += 3) {
                    const ex = r[j] ? r[j].v : '';
                    if (ex && ex !== "" && ex !== "...") {
                        const w = (r[j+1] && r[j+1].v) ? r[j+1].v : '';
                        const reps = (r[j+2] && r[j+2].v) ? r[j+2].v : '';
                        html += `<div class="ex-row">
                                    <div class="ex-text"><span>${ex}</span><span class="weight">${w}</span></div>
                                    <div class="reps">${reps}</div>
                                 </div>`;
                    }
                }
                html += `</div></div>`;
                
                if (index < 3) row1.innerHTML += html;
                else row2.innerHTML += html;
            });
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=${Date.now()}`;
            document.head.appendChild(s);
            s.onload = () => s.remove();
        }

        setInterval(refresh, 10000);
        setInterval(() => {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString('he-IL', {hour12:false});
        }, 1000);
        refresh();
    </script>
</body>
</html>
