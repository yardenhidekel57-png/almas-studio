<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alma's Studio - Smooth Sync</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100vh; margin: 0; padding: 0; overflow: hidden; background-color: #000; color: white; font-family: system-ui, sans-serif; }
        body { display: flex; flex-direction: column; padding: 10px; padding-top: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 0 30px; border-radius: 15px; border-bottom: 4px solid #00ffcc; height: 10vh; margin-bottom: 15px; position: relative; }
        .studio-logo { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-main { font-size: 2.2rem; color: #ffd700; font-weight: 900; }
        .logo-sub { font-size: 0.7rem; color: #00ffcc; letter-spacing: 4px; display: block; }
        #main-grid { display: grid; gap: 12px; flex-grow: 1; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .card { background: #161616; border: 2px solid #333; border-radius: 20px; padding: 15px; display: flex; flex-direction: column; }
        .name { font-size: 2.2rem; color: #ffd700; text-align: center; border-bottom: 2px solid #444; margin-bottom: 12px; font-weight: 900; padding-bottom: 5px; }
        .ex-list { flex-grow: 1; display: flex; flex-direction: column; }
        .ex-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 1.3rem; border-bottom: 1px solid #222; }
        .reps { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div id="date" style="font-size: 1.2rem;">--/--</div>
        <div class="studio-logo"><span class="logo-main">Alma's</span><span class="logo-sub">STUDIO</span></div>
        <div id="time" style="font-size: 2.2rem; color: #00ffcc; font-weight: bold;">00:00:00</div>
    </div>
    <div id="main-grid"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';

        async function fetchData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tcb=${Date.now()}`;
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;
                
                const grid = document.getElementById('main-grid');
                const now = new Date();
                const currentMin = now.getHours() * 60 + now.getMinutes();
                
                let allSessions = [];
                let currentSession = null;

                // שלב 1: איסוף כל האימונים מהגיליון
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i].c;
                    if (!row || !row[0] || !row[0].v) continue;
                    const cell = row[0].v.toString();

                    if (cell.includes("אימון")) {
                        const m = cell.match(/(\d{1,2}):(\d{2})/);
                        if (m) {
                            currentSession = { 
                                time: parseInt(m[1]) * 60 + parseInt(m[2]), 
                                trainees: [] 
                            };
                            allSessions.push(currentSession);
                        }
                    } else if (currentSession && isNaN(cell) && cell !== "מתאמנת") {
                        let t = { name: cell, ex: [] };
                        for (let j = 1; j < row.length; j += 3) {
                            if (row[j] && row[j].v) {
                                t.ex.push({ n: row[j].v, w: (row[j+1]?row[j+1].v:""), r: (row[j+2]?row[j+2].v:"") });
                            }
                        }
                        currentSession.trainees.push(t);
                    }
                }

                // שלב 2: בחירת האימון המתאים (זה שהכי קרוב לעכשיו)
                let bestSession = allSessions.find(s => currentMin >= s.time - 20 && currentMin < s.time + 40);
                
                // אם לא מצאנו אימון בטווח של 20 דק' לפני, ניקח את זה שהתחיל לא מזמן
                if (!bestSession) {
                    bestSession = allSessions.reverse().find(s => currentMin >= s.time);
                    allSessions.reverse(); // מחזירים סדר
                }

                grid.innerHTML = '';
                if (bestSession && bestSession.trainees.length > 0) {
                    bestSession.trainees.slice(0, 6).forEach(t => {
                        let html = `<div class="card"><div class="name">${t.name}</div><div class="ex-list">`;
                        t.ex.forEach(e => {
                            html += `<div class="ex-row"><span>${e.n} ${e.w}</span><span class="reps">${e.r}</span></div>`;
                        });
                        grid.innerHTML += html + `</div></div>`;
                    });
                }
                
                document.getElementById('date').innerText = now.toLocaleDateString('he-IL');
            } catch (e) { console.error(e); }
        }

        setInterval(fetchData, 10000);
        setInterval(() => {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString('he-IL');
        }, 1000);
        fetchData();
    </script>
</body>
</html>
