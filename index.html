<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alma's Studio - 50 Inch Fixed</title>
    <style>
        * { box-sizing: border-box; }
        html, body { 
            height: 100vh; margin: 0; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 20px; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #111; padding: 0 40px; border-radius: 20px; 
            border-bottom: 6px solid #00ffcc; height: 12vh; margin-bottom: 20px;
            flex-shrink: 0;
        }
        .studio-logo { text-align: center; flex-grow: 1; }
        .logo-main { font-size: 4.5rem; color: #ffd700; font-weight: 900; display: block; line-height: 1; }
        .logo-sub { font-size: 1.2rem; color: #00ffcc; letter-spacing: 10px; text-transform: uppercase; }

        /* גריד שמתאים את עצמו אוטומטית ל-5 מתאמנות */
        #main-grid { 
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 עמודות */
            grid-template-rows: 1fr 1fr;           /* 2 שורות שוות */
            gap: 25px; 
            flex-grow: 1;
            min-height: 0; /* מונע מהגריד לקרוס */
        }

        .card { 
            background: #161616; 
            border: 2px solid #333; 
            border-radius: 30px; 
            padding: 25px; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            overflow: hidden; /* מונע מהטקסט לצאת החוצה */
        }

        /* המתאמנת הרביעית והחמישית יתפסו מקום בשורה השנייה */
        /* אם תרצי שהן יהיו במרכז השורה השנייה, אפשר להוסיף לוגיקה נוספת, אבל כרגע זה ישמור על סדר */

        .name { 
            font-size: 3.5rem; color: #ffd700; text-align: center; 
            border-bottom: 3px solid #444; margin-bottom: 15px; 
            padding-bottom: 10px; font-weight: 900;
            white-space: nowrap;
        }

        .ex-list {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* הצמדה למעלה למניעת מתיחה מוזרה */
            gap: 10px;
        }

        .ex-row { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 2.2rem; /* פונט ענק ל-50 אינץ' */
            padding: 12px 0; 
            border-bottom: 1px solid #222;
        }

        .reps { 
            color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); 
            padding: 5px 20px; border-radius: 15px; border: 2px solid rgba(0, 255, 204, 0.3);
            min-width: 100px; text-align: center;
        }
        
        .weight { color: #ff9f43; font-weight: bold; margin-right: 15px; font-size: 1.8rem; }
    </style>
</head>
<body>

    <div class="header">
        <div id="date" style="font-size: 2.5rem; color: #888;">--/--</div>
        <div class="studio-logo">
            <span class="logo-main">Alma's</span>
            <span class="logo-sub">STUDIO</span>
        </div>
        <div id="time" style="font-size: 4rem; color: #00ffcc; font-weight: 900;">00:00:00</div>
    </div>

    <div id="main-grid"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function handleData(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const grid = document.getElementById('main-grid');
            let content = '';
            let count = 0;

            for (let i = 0; i < rows.length && count < 6; i++) {
                const r = rows[i].c;
                if (!r || !r[0] || !r[0].v) continue;
                
                const name = r[0].v.toString().trim();
                if (name === "" || name.includes("אימון") || name === "מתאמנת") continue;

                let cardHtml = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                
                for (let j = 1; j < r.length; j += 3) {
                    const ex = r[j] ? r[j].v : '';
                    if (ex && ex !== "" && ex !== "...") {
                        const w = (r[j+1] && r[j+1].v) ? r[j+1].v : '';
                        const reps = (r[j+2] && r[j+2].v) ? r[j+2].v : '';
                        cardHtml += `<div class="ex-row">
                                        <div><span>${ex}</span> <span class="weight">${w}</span></div>
                                        <span class="reps">${reps}</span>
                                     </div>`;
                    }
                }
                cardHtml += `</div></div>`;
                content += cardHtml;
                count++;
            }
            grid.innerHTML = content;
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=${Date.now()}`;
            document.head.appendChild(s);
            s.onload = () => s.remove();
        }

        setInterval(refresh, 10000);
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('he-IL');
            document.getElementById('date').innerText = now.toLocaleDateString('he-IL', {day:'numeric', month:'numeric'});
        }, 1000);

        refresh();
    </script>
</body>
</html>
