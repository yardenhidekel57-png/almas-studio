<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alma Studio V3 - Bold & Modern</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; margin: 0; padding: 0;
            background-color: #000; color: white; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            overflow: hidden;
        }

        /* מבנה גמיש למסך */
        .app-container {
            display: flex; flex-direction: column;
            height: 100vh; height: -webkit-fill-available;
            padding: 10px 15px env(safe-area-inset-bottom);
        }

        /* הדר עליון יוקרתי */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: #111; border-radius: 20px;
            border-bottom: 3px solid #00ffcc; margin-bottom: 15px; flex-shrink: 0;
        }
        .main-title { font-size: 3rem; color: #ffd700; font-weight: 900; line-height: 0.8; text-align: center; }
        .sub-title { font-size: 1rem; color: #00ffcc; letter-spacing: 5px; display: block; font-weight: bold; }
        #clock { font-size: 2.2rem; font-weight: bold; color: #00ffcc; }

        /* אזור כרטיסיות - גדולות וקריאות */
        .workout-content {
            flex-grow: 1; overflow-y: auto; display: grid; gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            padding-bottom: 180px; /* רווח בשביל הטיימר הצף */
            align-content: start;
        }

        .trainee-card {
            background: #181818; border-radius: 30px; padding: 25px;
            border: 2px solid #282828; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .trainee-name { 
            font-size: 3.2rem; color: #ffd700; text-align: center; 
            margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 10px; font-weight: 800;
        }
        .exercise-item { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.8rem; padding: 10px 0; border-bottom: 1px solid #222;
        }
        .val-weight { color: #ff9f43; font-weight: bold; }
        .val-reps { color: #00ffcc; font-weight: bold; border: 2px solid #00ffcc; padding: 4px 15px; border-radius: 12px; }

        /* הטיימר המודרני - צף בתחתית */
        .modern-timer-panel {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 2px solid #333; border-top: 4px solid #ff9f43;
            border-radius: 30px; padding: 20px;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.8);
            z-index: 999;
        }

        .progress-bar-bg { width: 100%; height: 10px; background: #222; border-radius: 5px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff9f43, #ff4500); transition: width 1s linear; }

        .timer-controls-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .timer-clock-face { font-size: 4.5rem; font-weight: 900; color: #ff9f43; font-variant-numeric: tabular-nums; text-shadow: 0 0 15px rgba(255,159,67,0.3); }
        
        .action-buttons { display: flex; gap: 15px; }
        .action-btn { 
            padding: 15px 35px; border-radius: 20px; border: none; font-size: 1.4rem; font-weight: 800;
            cursor: pointer; transition: all 0.2s ease;
        }
        .btn-play { background: #00ffcc; color: #000; }
        .btn-stop { background: #222; color: #fff; border: 1px solid #444; }

        #active-session-name { color: #ffd700; font-size: 1.5rem; font-weight: bold; }

        /* תיקוני מובייל */
        @media (max-width: 600px) {
            .main-title { font-size: 2rem; }
            .timer-clock-face { font-size: 3rem; }
            .workout-content { grid-template-columns: 1fr; padding-bottom: 200px; }
            .action-btn { padding: 10px 20px; font-size: 1.1rem; }
            .trainee-name { font-size: 2.2rem; }
        }
    </style>
</head>
<body onclick="document.getElementById('finish-sound').load()">

<div class="app-container">
    <div class="top-nav">
        <div id="clock">00:00</div>
        <div class="header-logo">
            <div class="main-title">Alma's<span class="sub-title">STUDIO</span></div>
        </div>
        <div style="width: 80px;"></div>
    </div>

    <div id="main-grid" class="workout-content"></div>

    <div class="modern-timer-panel">
        <div class="progress-bar-bg"><div id="bar-fill" class="progress-bar-fill"></div></div>
        <div class="timer-row-content">
            <div class="timer-controls-row">
                <div id="active-session-name">טוען נתונים...</div>
                <div id="display-time" class="timer-clock-face">07:00</div>
                <div class="action-buttons">
                    <button id="p-btn" class="action-btn btn-play" onclick="toggleT(event)">הפעל</button>
                    <button class="action-btn btn-stop" onclick="resetT(event)">איפוס</button>
                </div>
            </div>
        </div>
    </div>
</div>

<audio id="finish-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    const S_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 
    const MAX_T = 7 * 60;
    let currT = MAX_T;
    let isR = false;
    let tInt;

    function toggleT(e) {
        if (e) e.stopPropagation();
        const b = document.getElementById('p-btn');
        if (isR) {
            clearInterval(tInt);
            b.innerText = "המשך";
        } else {
            tInt = setInterval(tick, 1000);
            b.innerText = "עצור";
        }
        isR = !isR;
    }

    function resetT(e) {
        if (e) e.stopPropagation();
        clearInterval(tInt);
        isR = false;
        currT = MAX_T;
        document.getElementById('p-btn').innerText = "הפעל";
        drawT();
    }

    function tick() {
        if (currT <= 0) {
            document.getElementById('finish-sound').play();
            currT = MAX_T;
        } else { currT--; }
        drawT();
    }

    function drawT() {
        const m = Math.floor(currT / 60);
        const s = currT % 60;
        document.getElementById('display-time').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        document.getElementById('bar-fill').style.width = (currT / MAX_T) * 100 + "%";
    }

    function handleData(d) {
        if (!d || !d.table) return;
        const rows = d.table.rows;
        const grid = document.getElementById('main-grid');
        const now = new Date();
        const cMins = now.getHours() * 60 + now.getMinutes();
        let sessionRows = [];
        let sTitle = "";

        for (let i = 0; i < rows.length; i++) {
            const first = rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
            if (first.includes("אימון")) {
                const tm = first.match(/(\d{1,2}):?(\d{2})?/);
                if (tm) {
                    const start = parseInt(tm[1]) * 60 + (tm[2] ? parseInt(tm[2]) : 0);
                    if (cMins >= start && cMins < (start + 60)) {
                        sTitle = first;
                        let j = i + 1;
                        while (j < rows.length) {
                            const nxt = rows[j].c[0] ? rows[j].c[0].v.toString().trim() : "";
                            if (nxt.includes("אימון") || nxt === "") break;
                            sessionRows.push(rows[j]);
                            j++;
                        }
                    }
                }
            }
        }

        if (sessionRows.length > 0) {
            document.getElementById('active-session-name').innerText = sTitle;
            grid.innerHTML = sessionRows.map(r => {
                const name = r.c[0].v;
                let exs = '';
                for (let j = 1; j < r.c.length; j += 3) {
                    const ex = r.c[j] ? r.c[j].v : '';
                    const w = (r.c[j+1] && r.c[j+1].v) ? r.c[j+1].v : '';
                    const rp = (r.c[j+2] && r.c[j+2].v) ? r.c[j+2].v : '-';
                    if (ex && ex !== "...") exs += `<div class="exercise-item"><div>${ex} <span class="val-weight">${w}</span></div><span class="val-reps">${rp}</span></div>`;
                }
                return `<div class="trainee-card"><div class="trainee-name">${name}</div>${exs}</div>`;
            }).join('');
        } else {
            document.getElementById('active-session-name').innerText = "אין אימון פעיל";
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding-top:100px;color:#333;font-size:3rem;">READY TO START</div>';
        }
    }

    function refresh() {
        const s = document.createElement('script');
        s.src = `https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=${Date.now()}`;
        document.body.appendChild(s);
    }

    setInterval(refresh, 5000);
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
    }, 1000);
    refresh();
</script>
</body>
</html>
