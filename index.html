<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDIO ALMA - EMERGENCY FIX</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: #000; color: white; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; padding: 2px; }
        .header { height: 45px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 3px solid #ff6600; margin-bottom: 5px; flex-shrink: 0; }
        .logo-main { font-size: 26px; color: #ff6600; font-weight: 900; }
        #time { font-size: 24px; color: #00ffcc; font-weight: 900; }
        #training-info { font-size: 18px; color: #ff6600; font-weight: bold; }
        #container { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .row { display: flex; flex: 1; gap: 4px; justify-content: center; align-items: stretch; max-height: 48%; }
        .card { background: #111; border: 1.5px solid #333; border-radius: 10px; display: flex; flex-direction: column; flex: 1; padding: 6px; }
        .name { font-size: 22px; color: #ff6600; text-align: center; border-bottom: 2px solid #444; margin-bottom: 5px; font-weight: 900; }
        .ex-list { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; }
        .ex-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding: 2px 0; }
        .ex-text { font-size: 18px; font-weight: 700; color: #eee; }
        .reps { color: #00ffcc; font-weight: 900; border: 1.5px solid #00ffcc; padding: 2px 6px; border-radius: 4px; font-size: 16px; min-width: 70px; text-align: center; }
        .weight { color: #ff9f43; font-weight: bold; margin-right: 5px; font-size: 14px; }
        .footer-credit { height: 20px; font-size: 14px; color: #ff6600; text-align: left; padding: 0 15px; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div id="training-info">מעדכן...</div>
        <div class="logo-main">STUDIO ALMA</div>
        <div id="time">00:00:00</div>
    </div>
    <div id="container"></div>
    <div class="footer-credit">Developed by Gal E</div>

    <script>
        var SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';
        // פנייה ישירה לקובץ CSV - הכי אמין שיש
        var CSV_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=0';

        function parseCSV(text) {
            var lines = text.split('\n');
            return lines.map(line => {
                // טיפול בגרשיים שגוגל מוסיף ב-CSV
                return line.split(',').map(cell => cell.replace(/^"|"$/g, '').trim());
            });
        }

        async function updateDashboard() {
            try {
                const response = await fetch(CSV_URL + '&cache=' + Date.now());
                const text = await response.text();
                const rows = parseCSV(text);
                
                var now = new Date();
                var nowMin = (now.getHours() * 60) + now.getMinutes();
                var sessions = [];
                var currentSession = null;

                for (var i = 0; i < rows.length; i++) {
                    var cellA = rows[i][0];
                    if (cellA && cellA.includes("אימון")) {
                        var timeMatch = cellA.match(/(\d{1,2}):(\d{2})/);
                        if (timeMatch) {
                            var sMin = (parseInt(timeMatch[1]) * 60) + parseInt(timeMatch[2]);
                            if (currentSession) sessions.push(currentSession);
                            currentSession = { start: sMin, title: cellA, trainees: [] };
                        }
                    } else if (currentSession && cellA && cellA !== "מתאמנת" && cellA !== "") {
                        currentSession.trainees.push(rows[i]);
                    }
                }
                if (currentSession) sessions.push(currentSession);

                // בחירת האימון המתאים (נוכחי או זה שהתחיל לא מזמן)
                var active = null;
                for (var j = 0; j < sessions.length; j++) {
                    // מציג אימון שהתחיל עד לפני 90 דקות
                    if (nowMin >= sessions[j].start && nowMin < (sessions[j].start + 90)) {
                        active = sessions[j];
                    }
                }
                
                // אם אין אימון שרץ עכשיו, מראה את הבא בטווח של 10 דקות
                if (!active) {
                    for (var j = 0; j < sessions.length; j++) {
                        if (nowMin >= (sessions[j].start - 10) && nowMin < sessions[j].start) {
                            active = sessions[j];
                            break;
                        }
                    }
                }

                render(active);
            } catch (e) {
                document.getElementById('training-info').innerText = "שגיאת חיבור";
            }
        }

        function render(active) {
            var container = document.getElementById('container');
            var info = document.getElementById('training-info');
            if (!active) {
                container.innerHTML = '<div style="text-align:center;font-size:30px;margin-top:15%;color:#444;">ממתין לאימון הבא</div>';
                info.innerText = "הפסקה";
                return;
            }
            info.innerText = active.title;
            container.innerHTML = '';
            
            var trainees = active.trainees;
            var maxPerRow = trainees.length <= 3 ? trainees.length : Math.ceil(trainees.length / 2);
            var rowDiv = document.createElement('div');
            rowDiv.className = 'row';

            trainees.forEach((t, index) => {
                if (index > 0 && index % maxPerRow === 0) {
                    container.appendChild(rowDiv);
                    rowDiv = document.createElement('div');
                    rowDiv.className = 'row';
                }
                var exHtml = "";
                for (var m = 1; m < t.length; m += 3) {
                    var ex = t[m] || "";
                    if (ex && ex !== "...") {
                        var w = t[m+1] || "";
                        var r = t[m+2] || "";
                        exHtml += `<div class="ex-row"><div class="ex-text"><span>${ex}</span><span class="weight">${w}</span></div><div class="reps">${r}</div></div>`;
                    }
                }
                var card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="name">${t[0]}</div><div class="ex-list">${exHtml}</div>`;
                rowDiv.appendChild(card);
            });
            container.appendChild(rowDiv);
        }

        setInterval(updateDashboard, 15000);
        setInterval(() => {
            var d = new Date();
            document.getElementById('time').innerText = d.toTimeString().split(' ')[0];
        }, 1000);
        updateDashboard();
    </script>
</body>
</html>
