<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alma Studio - Smart Control</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; color: #fff; font-family: system-ui, sans-serif; }
        
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background-color: #111; border-radius: 15px;
            border-bottom: 3px solid #00ffcc; margin: 10px;
        }
        .studio-name { font-size: 1.8rem; color: #ffd700; font-weight: 900; }
        #live-clock { font-size: 1.5rem; color: #00ffcc; font-weight: bold; }

        .cards-grid { 
            display: grid; gap: 15px; padding: 10px;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            overflow-y: auto; height: calc(100vh - 200px); align-content: start;
        }

        .card { background-color: #161616; border-radius: 20px; padding: 20px; border: 2px solid #282828; }
        .trainee-name { font-size: 2.2rem; color: #ffd700; text-align: center; margin-bottom: 10px; border-bottom: 2px solid #333; padding-bottom: 8px; font-weight: 900; }
        .exercise-row { display: flex; justify-content: space-between; align-items: center; font-size: 1.4rem; padding: 8px 0; border-bottom: 1px solid #222; }
        .weight { color: #ff9f43; font-weight: bold; margin-right: 5px; }
        .reps { color: #00ffcc; font-weight: bold; border: 1px solid #00ffcc; padding: 2px 8px; border-radius: 8px; }

        /* פאנל טיימר וכפתורים */
        .control-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #111; padding: 15px; border-top: 3px solid #ff9f43;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            z-index: 1000;
        }
        #display-timer { font-size: 4rem; font-weight: 900; color: #ff9f43; line-height: 1; }
        
        .buttons-row { display: flex; gap: 15px; width: 100%; justify-content: center; }
        .btn { 
            padding: 12px 25px; font-size: 1.2rem; font-weight: bold; 
            border: none; border-radius: 12px; cursor: pointer; transition: 0.2s;
        }
        .btn-start { background: #00ffcc; color: #000; }
        .btn-reset { background: #ff4444; color: #fff; }
        .btn:active { transform: scale(0.95); }

        @media (max-width: 600px) {
            .studio-name { font-size: 1.4rem; }
            #display-timer { font-size: 3rem; }
            .btn { padding: 10px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body onclick="document.getElementById('beep').load()">

<div class="header">
    <div id="live-clock">00:00</div>
    <div class="studio-name">ALMA STUDIO</div>
    <div style="width: 40px;"></div>
</div>

<div id="main-grid" class="cards-grid"></div>

<div class="control-panel">
    <div id="display-timer">07:00</div>
    <div class="buttons-row">
        <button class="btn btn-start" onclick="startTimer()">הפעל טיימר</button>
        <button class="btn btn-reset" onclick="resetTimer()">איפוס</button>
    </div>
</div>

<audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';
    let timerInterval = null;
    let timeLeft = 7 * 60;

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('beep').play();
                return;
            }
            timeLeft--;
            updateTimerDisplay();
        }, 1000);
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        timeLeft = 7 * 60;
        updateTimerDisplay();
    }

    function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('display-timer').innerText = 
            `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function onData(data) {
        if (!data || !data.table) return;
        const rows = data.table.rows;
        const now = new Date();
        const currentTotalMins = (now.getHours() * 60) + now.getMinutes();
        
        let allWorkouts = [];
        for (let i = 0; i < rows.length; i++) {
            const firstCell = rows[i].c && rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
            if (firstCell.startsWith("אימון")) {
                const timeMatch = firstCell.match(/(\d{1,2}):(\d{2})/);
                if (timeMatch) allWorkouts.push({ index: i, mins: (parseInt(timeMatch[1]) * 60) + parseInt(timeMatch[2]) });
            }
        }

        let activeWorkout = null;
        for (let w of allWorkouts) { if (currentTotalMins >= w.mins) activeWorkout = w; }
        
        const grid = document.getElementById('main-grid');
        if (activeWorkout) {
            let html = "";
            let j = activeWorkout.index + 1;
            while (j < rows.length) {
                if (!rows[j].c || !rows[j].c[0] || rows[j].c[0].v.toString().includes("אימון")) break;
                let exHtml = "";
                for (let k = 1; k < rows[j].c.length; k += 3) {
                    if (rows[j].c[k]?.v && rows[j].c[k].v !== "...") {
                        exHtml += `<div class="exercise-row"><div>${rows[j].c[k].v} <span class="weight">${rows[j].c[k+1]?.v || ''}</span></div><span class="reps">${rows[j].c[k+2]?.v || '-'}</span></div>`;
                    }
                }
                html += `<div class="card"><div class="trainee-name">${rows[j].c[0].v}</div>${exHtml}</div>`;
                j++;
            }
            grid.innerHTML = html;
        }
    }

    function fetchData() {
        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:onData&gid=0&tcb=${Date.now()}`;
        document.body.appendChild(script);
    }

    setInterval(fetchData, 10000);
    setInterval(() => {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
    }, 1000);
    
    fetchData();
</script>
</body>
</html>
