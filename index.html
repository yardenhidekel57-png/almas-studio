<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma's Studio - Final Sync</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100vh; margin: 0; padding: 0; overflow: hidden; background-color: #000; color: white; font-family: system-ui, -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; padding: 10px; padding-top: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 0 30px; border-radius: 15px; border-bottom: 4px solid #00ffcc; height: 10vh; margin-bottom: 15px; position: relative; }
        .studio-logo { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-main { font-size: 2.2rem; color: #ffd700; font-weight: 900; letter-spacing: 2px; }
        .logo-sub { font-size: 0.7rem; color: #00ffcc; letter-spacing: 4px; display: block; margin-top: -5px; }
        #main-grid { display: grid; gap: 12px; flex-grow: 1; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .card { background: #161616; border: 2px solid #333; border-radius: 20px; padding: 12px; display: flex; flex-direction: column; box-shadow: 0 8px 30px rgba(0,0,0,0.8); }
        .name { font-size: clamp(1.4rem, 3.5vh, 2.2rem); color: #ffd700; text-align: center; border-bottom: 2px solid #444; margin-bottom: 8px; padding-bottom: 5px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ex-list { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; overflow-y: auto; scrollbar-width: none; }
        .ex-row { display: flex; justify-content: space-between; align-items: center; font-size: clamp(0.8rem, 2vh, 1.4rem); padding: 6px 0; border-bottom: 1px solid #222; }
        .reps { color: #00ffcc; font-weight: bold; background: rgba(0, 255, 204, 0.1); padding: 1px 10px; border-radius: 6px; }
    </style>
</head>
<body onclick="if(!document.fullscreenElement) document.documentElement.requestFullscreen();">

    <div class="header">
        <div id="date" style="font-size: 1.1rem;">--/--</div>
        <div class="studio-logo"><span class="logo-main">Alma's</span><span class="logo-sub">STUDIO</span></div>
        <div id="time" style="font-size: 2rem; color: #00ffcc; font-weight: bold;">00:00:00</div>
    </div>

    <div id="main-grid"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function googleDocCallback(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';

            const now = new Date();
            const currentTotalMinutes = now.getHours() * 60 + now.getMinutes();

            let targetSessionRows = [];
            let isInsideTargetSession = false;

            for (let i = 0; i < rows.length; i++) {
                const firstCell = rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
                
                // בדיקה אם השורה היא שורת "אימון"
                if (firstCell.includes("אימון")) {
                    const timeParts = firstCell.match(/(\d{1,2}):(\d{2})/);
                    if (timeParts) {
                        const sHour = parseInt(timeParts[1]);
                        const sMin = parseInt(timeParts[2]);
                        const sTotalMinutes = sHour * 60 + sMin;

                        // חלון תצוגה: 20 דקות לפני ועד 90 דקות אחרי
                        if (currentTotalMinutes >= (sTotalMinutes - 20) && currentTotalMinutes < (sTotalMinutes + 90)) {
                            isInsideTargetSession = true;
                            targetSessionRows = []; // מאפס רשימה עבור האימון הנוכחי שנמצא
                        } else {
                            isInsideTargetSession = false;
                        }
                    }
                    continue;
                }

                // אם אנחנו בתוך הטווח של אימון שמצאנו, אוספים את שמות המתאמנות
                if (isInsideTargetSession && firstCell !== "" && isNaN(firstCell)) {
                    targetSessionRows.push(rows[i]);
                }
            }

            // הצגה על המסך
            if (targetSessionRows.length > 0) {
                targetSessionRows.slice(0, 6).forEach(row => {
                    const name = row.c[0].v;
                    let html = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                    for (let j = 1; j < row.c.length; j += 3) {
                        const ex = row.c[j] ? row.c[j].v : '';
                        const reps = (row.c[j+2] && row.c[j+2].v) ? row.c[j+2].v : '-';
                        if (ex && ex !== "" && ex !== "...") {
                            html += `<div class="ex-row"><span>${ex}</span><span class="reps">${reps}</span></div>`;
                        }
                    }
                    html += `</div></div>`;
                    grid.innerHTML += html;
                });
            }
        }

        function refresh() {
            const s = document.createElement('script');
            // מושך את הנתונים ללא ציון gid כדי לקחת את הטאב הראשון
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:googleDocCallback&tcb=${Date.now()}`;
            document.body.appendChild(s);
        }

        function clock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('he-IL', {weekday:'long', day:'numeric', month:'numeric'});
        }

        setInterval(refresh, 8000); 
        setInterval(clock, 1000);
        refresh(); clock();
    </script>
</body>
</html>
