<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alma Studio - Final Fix</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        
        body { 
            display: flex; flex-direction: column;
            padding: 15px; color: #fff; 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 25px; background-color: #111; border-radius: 20px;
            border-bottom: 4px solid #00ffcc; margin-bottom: 15px; flex-shrink: 0;
        }
        .studio-name { font-size: 2.5rem; color: #ffd700; font-weight: 900; }
        #live-clock { font-size: 2.2rem; color: #00ffcc; font-weight: bold; }

        .cards-grid { 
            flex-grow: 1;
            display: grid; gap: 20px; 
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); 
            overflow-y: auto;
            align-content: start;
        }

        .card { 
            background-color: #161616; border-radius: 30px; padding: 35px; 
            border: 3px solid #282828; box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }
        .trainee-name { 
            font-size: 3.8rem; color: #ffd700; text-align: center; 
            margin-bottom: 20px; border-bottom: 3px solid #333; padding-bottom: 15px;
            font-weight: 900;
        }
        .exercise-row { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 2.3rem; padding: 15px 0; border-bottom: 1px solid #222;
        }
        .weight { color: #ff9f43; font-weight: bold; margin-right: 15px; }
        .reps { 
            color: #00ffcc; font-weight: bold; border: 2px solid #00ffcc; 
            padding: 5px 20px; border-radius: 12px; font-size: 2.1rem;
            min-width: 90px; text-align: center;
        }

        .no-workout {
            grid-column: 1/-1; text-align: center; margin-top: 100px;
            font-size: 5rem; color: #222; font-weight: 900;
        }
    </style>
</head>
<body>

<div class="header">
    <div id="live-clock">00:00</div>
    <div class="studio-name">ALMA STUDIO</div>
    <div style="width: 50px;"></div>
</div>

<div id="main-grid" class="cards-grid"></div>

<script>
    const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';

    function onData(data) {
        if (!data || !data.table) return;
        const rows = data.table.rows;
        const grid = document.getElementById('main-grid');
        
        const now = new Date();
        const currentTotalMins = (now.getHours() * 60) + now.getMinutes();
        
        let allWorkouts = [];

        // 1. איסוף כל האימונים מהגיליון
        for (let i = 0; i < rows.length; i++) {
            const firstCell = rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
            if (firstCell.startsWith("אימון")) {
                const timeMatch = firstCell.match(/(\d{1,2}):(\d{2})/);
                if (timeMatch) {
                    const workoutMins = (parseInt(timeMatch[1]) * 60) + parseInt(timeMatch[2]);
                    allWorkouts.push({ index: i, mins: workoutMins });
                }
            }
        }

        // 2. מציאת האימון הנוכחי (זה שהשעה שלו כבר הגיעה אבל הוא הכי מאוחר מביניהם)
        let activeWorkout = null;
        for (let i = 0; i < allWorkouts.length; i++) {
            if (currentTotalMins >= allWorkouts[i].mins) {
                activeWorkout = allWorkouts[i];
            }
        }

        grid.innerHTML = "";

        if (activeWorkout) {
            // בדיקה אם זה האימון האחרון ברשימה הכללית של הגיליון
            const isLastInSheet = (activeWorkout.index === allWorkouts[allWorkouts.length - 1].index);
            
            // חישוב כמה זמן עבר מתחילת האימון
            const diff = currentTotalMins - activeWorkout.mins;

            // אם זה האימון האחרון ועברו 2 דקות או יותר -> מנקים
            if (isLastInSheet && diff >= 2) {
                grid.innerHTML = '<div class="no-workout">ALMA STUDIO</div>';
                return;
            }

            // הצגת המתאמנות לאימון שנבחר
            let foundRows = [];
            let j = activeWorkout.index + 1;
            while (j < rows.length) {
                const cellVal = rows[j].c[0] ? rows[j].c[0].v.toString().trim() : "";
                if (cellVal.startsWith("אימון")) break;
                if (cellVal !== "") foundRows.push(rows[j]);
                j++;
            }

            grid.innerHTML = foundRows.map(row => {
                const name = row.c[0].v;
                let exHtml = '';
                for (let k = 1; k < row.c.length; k += 3) {
                    const ex = row.c[k] ? row.c[k].v : '';
                    const w = (row.c[k+1] && row.c[k+1].v) ? row.c[k+1].v : '';
                    const r = (row.c[k+2] && row.c[k+2].v) ? row.c[k+2].v : '-';
                    if (ex && ex !== "...") {
                        exHtml += `<div class="exercise-row"><div>${ex} <span class="weight">${w}</span></div><span class="reps">${r}</span></div>`;
                    }
                }
                return `<div class="card"><div class="trainee-name">${name}</div>${exHtml}</div>`;
            }).join('');
        } else {
            grid.innerHTML = '<div class="no-workout">ALMA STUDIO</div>';
        }
    }

    function fetchData() {
        const old = document.getElementById('sheets-script');
        if (old) old.remove();
        const script = document.createElement('script');
        script.id = 'sheets-script';
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:onData&gid=0&tcb=${Date.now()}`;
        document.body.appendChild(script);
    }

    setInterval(fetchData, 5000);
    setInterval(() => {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
    }, 1000);
    fetchData();
</script>
</body>
</html>
