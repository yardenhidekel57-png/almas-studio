<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Alma's Studio - Final Fix</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100vh; margin: 0; padding: 0; overflow: hidden; background-color: #000; color: white; font-family: system-ui, sans-serif; }
        body { display: flex; flex-direction: column; padding: 10px; padding-top: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 0 30px; border-radius: 15px; border-bottom: 4px solid #00ffcc; height: 10vh; margin-bottom: 15px; position: relative; }
        .studio-logo { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-main { font-size: 2.2rem; color: #ffd700; font-weight: 900; }
        .logo-sub { font-size: 0.7rem; color: #00ffcc; letter-spacing: 4px; display: block; }
        #main-grid { display: grid; gap: 15px; flex-grow: 1; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .card { background: #161616; border: 2px solid #333; border-radius: 25px; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .name { font-size: 2.2rem; color: #ffd700; text-align: center; border-bottom: 2px solid #444; margin-bottom: 12px; font-weight: 900; }
        .ex-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 1.3rem; border-bottom: 1px solid #222; }
        .reps { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div id="date">--/--</div>
        <div class="studio-logo"><span class="logo-main">Alma's</span><span class="logo-sub">STUDIO</span></div>
        <div id="time" style="font-size: 2.5rem; color: #00ffcc; font-weight: 900;">00:00:00</div>
    </div>
    <div id="main-grid"></div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';

        // פונקציית הקסם שגוגל תפעיל
        function handleResponse(response) {
            const rows = response.table.rows;
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            
            let count = 0;
            for (let i = 0; i < rows.length && count < 6; i++) {
                const row = rows[i].c;
                if (!row || !row[0] || !row[0].v) continue;
                
                const firstVal = row[0].v.toString();
                if (firstVal.includes("אימון") || firstVal.includes("מתאמנת")) continue;

                let html = `<div class="card"><div class="name">${firstVal}</div><div>`;
                for (let j = 1; j < row.length; j += 3) {
                    if (row[j] && row[j].v) {
                        const ex = row[j].v;
                        const w = (row[j+1] && row[j+1].v) ? row[j+1].v : "";
                        const r = (row[j+2] && row[j+2].v) ? row[j+2].v : "";
                        html += `<div class="ex-row"><span>${ex} ${w}</span><span class="reps">${r}</span></div>`;
                    }
                }
                grid.innerHTML += html + `</div></div>`;
                count++;
            }
        }

        function refreshData() {
            // מסיר סקריפט קודם אם קיים
            const oldScript = document.getElementById('google-script');
            if (oldScript) oldScript.remove();

            const s = document.createElement('script');
            s.id = 'google-script';
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleResponse&tcb=${Date.now()}`;
            document.body.appendChild(s);
        }

        setInterval(refreshData, 10000);
        setInterval(() => {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString('he-IL');
            document.getElementById('date').innerText = n.toLocaleDateString('he-IL', {weekday: 'long', day: 'numeric', month: 'numeric'});
        }, 1000);
        
        refreshData();
    </script>
</body>
</html>
