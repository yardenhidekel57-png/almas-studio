<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alma Studio - Full Screen View</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
        
        /* כותרת עליונה */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1vh 2vw; background-color: #111; border-radius: 15px;
            border-bottom: 3px solid #00ffcc; margin: 10px; flex-shrink: 0;
            height: 8vh;
        }
        .studio-name { font-size: 3.5vh; color: #ffd700; font-weight: 900; }
        #live-clock { font-size: 3vh; color: #00ffcc; font-weight: bold; }

        /* גריד הכרטיסיות - מותאם למסכים גדולים */
        .cards-grid { 
            display: grid; 
            gap: 20px; 
            padding: 15px;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            overflow-y: auto; 
            height: 88vh; 
            align-content: start;
        }

        /* עיצוב כרטיסייה מוגדל */
        .card { 
            background-color: #161616; 
            border-radius: 25px; 
            padding: 2.5vh; 
            border: 3px solid #282828; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .trainee-name { 
            font-size: 4vh; 
            color: #ffd700; 
            text-align: center; 
            margin-bottom: 1.5vh; 
            border-bottom: 2px solid #333; 
            padding-bottom: 1vh; 
            font-weight: 900; 
        }

        .exercise-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 2.8vh; 
            padding: 1.2vh 0; 
            border-bottom: 1px solid #222; 
        }

        .weight { color: #ff9f43; font-weight: bold; margin-right: 10px; }
        .reps { 
            color: #00ffcc; 
            font-weight: bold; 
            border: 2px solid #00ffcc; 
            padding: 4px 15px; 
            border-radius: 12px; 
            min-width: 60px;
            text-align: center;
        }

        /* התאמה מיוחדת למסכים קטנים (אייפון) */
        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            .trainee-name { font-size: 3vh; }
            .exercise-row { font-size: 2.2vh; }
        }

        .cards-grid::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div id="live-clock">00:00</div>
    <div class="studio-name">ALMA STUDIO</div>
    <div style="width: 30px;"></div>
</div>

<div id="main-grid" class="cards-grid"></div>

<script>
    const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';

    function onData(data) {
        if (!data || !data.table) return;
        const rows = data.table.rows;
        const now = new Date();
        const nowMins = now.getHours() * 60 + now.getMinutes();

        let allWorkouts = [];
        for (let i = 0; i < rows.length; i++) {
            const firstCell = rows[i].c && rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
            if (firstCell.startsWith("אימון")) {
                const tm = firstCell.match(/(\d{1,2}):(\d{2})/);
                if (tm) allWorkouts.push({ index: i, mins: parseInt(tm[1]) * 60 + parseInt(tm[2]) });
            }
        }

        let activeW = null;
        for (let w of allWorkouts) { if (nowMins >= w.mins) activeW = w; }

        const grid = document.getElementById('main-grid');
        if (activeW) {
            let html = "";
            let j = activeW.index + 1;
            while (j < rows.length) {
                if (!rows[j].c || !rows[j].c[0] || rows[j].c[0].v.toString().includes("אימון")) break;
                
                let exHtml = "";
                for (let k = 1; k < rows[j].c.length; k += 3) {
                    if (rows[j].c[k]?.v && rows[j].c[k].v !== "...") {
                        exHtml += `
                            <div class="exercise-row">
                                <div>${rows[j].c[k].v} <span class="weight">${rows[j].c[k+1]?.v || ''}</span></div>
                                <span class="reps">${rows[j].c[k+2]?.v || '-'}</span>
                            </div>`;
                    }
                }
                
                html += `
                    <div class="card">
                        <div class="trainee-name">${rows[j].c[0].v}</div>
                        ${exHtml}
                    </div>`;
                j++;
            }
            grid.innerHTML = html;
        }
    }

    function fetchData() {
        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:onData&gid=0&tcb=${Date.now()}`;
        document.body.appendChild(script);
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
    }, 1000);

    setInterval(fetchData, 10000);
    fetchData();
</script>

</body>
</html>
