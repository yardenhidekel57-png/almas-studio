<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alma Studio - Column U Sync</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background-color: #111; border-radius: 15px; border-bottom: 3px solid #00ffcc; margin: 10px; flex-shrink: 0; }
        .studio-name { font-size: 1.8rem; color: #ffd700; font-weight: 900; }
        #live-clock { font-size: 1.5rem; color: #00ffcc; font-weight: bold; }
        .cards-grid { display: grid; gap: 15px; padding: 10px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); overflow-y: auto; height: calc(100vh - 180px); align-content: start; padding-bottom: 120px; }
        .card { background-color: #161616; border-radius: 20px; padding: 20px; border: 2px solid #282828; }
        .trainee-name { font-size: 2.2rem; color: #ffd700; text-align: center; margin-bottom: 10px; border-bottom: 2px solid #333; padding-bottom: 8px; font-weight: 900; }
        .exercise-row { display: flex; justify-content: space-between; align-items: center; font-size: 1.4rem; padding: 8px 0; border-bottom: 1px solid #222; }
        .weight { color: #ff9f43; font-weight: bold; }
        .reps { color: #00ffcc; font-weight: bold; border: 1px solid #00ffcc; padding: 2px 8px; border-radius: 8px; }
        .timer-panel { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(17, 17, 17, 0.95); padding: 15px; border-top: 3px solid #ff9f43; display: flex; justify-content: space-around; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        #display-timer { font-size: 4.5rem; font-weight: 900; color: #ff9f43; font-variant-numeric: tabular-nums; }
        #sync-status { width: 15px; height: 15px; border-radius: 50%; background: #ff4444; transition: background 0.5s; }
    </style>
</head>
<body onclick="document.getElementById('beep').load()">

<div class="header">
    <div id="live-clock">00:00</div>
    <div class="studio-name">ALMA STUDIO</div>
    <div style="width: 30px;"></div>
</div>

<div id="main-grid" class="cards-grid"></div>

<div class="timer-panel">
    <div id="sync-status"></div>
    <div id="display-timer">07:00</div>
    <div style="width: 15px;"></div>
</div>

<audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';
    const DURATION = 7 * 60;
    let lastStartTime = 0;

    function parseTime(cell) {
        if (!cell) return null;
        if (cell.f) {
            const p = cell.f.match(/(\d{1,2}):(\d{2}):?(\d{2})?/);
            if (p) return parseInt(p[1]) * 3600 + parseInt(p[2]) * 60 + (p[3] ? parseInt(p[3]) : 0);
        }
        if (typeof cell.v === 'number') return Math.round(cell.v * 86400);
        if (typeof cell.v === 'string') {
            const p = cell.v.match(/(\d{1,2}):(\d{2})/);
            if (p) return parseInt(p[1]) * 3600 + parseInt(p[2]) * 60;
        }
        return null;
    }

    function onData(data) {
        if (!data || !data.table) return;
        const rows = data.table.rows;
        let foundStartSecs = null;

        // סריקה רחבה: בודק את עמודות U (20), V (21), W (22) וגם את B (1) ליתר ביטחון
        const columnsToSearch = [20, 21, 22, 1, 0]; 
        
        for (let colIdx of columnsToSearch) {
            for (let i = 0; i < rows.length; i++) {
                const cell = rows[i].c && rows[i].c[colIdx] ? rows[i].c[colIdx].v : null;
                if (cell && cell.toString().toUpperCase().trim() === "START") {
                    if (rows[i+1] && rows[i+1].c[colIdx]) {
                        foundStartSecs = parseTime(rows[i+1].c[colIdx]);
                        break;
                    }
                }
            }
            if (foundStartSecs !== null) break;
        }

        const statusDot = document.getElementById('sync-status');
        const timerText = document.getElementById('display-timer');

        if (foundStartSecs !== null) {
            statusDot.style.background = "#00ffcc"; // נמצא START!
            const now = new Date();
            const nowSecs = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            const elapsed = nowSecs - foundStartSecs;
            const remaining = Math.max(0, DURATION - elapsed);
            
            const m = Math.floor(remaining / 60), s = remaining % 60;
            timerText.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            if (remaining === 0 && lastStartTime !== foundStartSecs) {
                document.getElementById('beep').play();
                lastStartTime = foundStartSecs;
            }
        } else {
            statusDot.style.background = "#ff4444"; // לא נמצא START בעמודות שנבדקו
            timerText.innerText = "07:00";
        }

        renderCards(rows);
    }

    function renderCards(rows) {
        const now = new Date();
        const nowMins = now.getHours() * 60 + now.getMinutes();
        let allWorkouts = [];
        for (let i = 0; i < rows.length; i++) {
            const cell = rows[i].c && rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
            if (cell.startsWith("אימון")) {
                const tm = cell.match(/(\d{1,2}):(\d{2})/);
                if (tm) allWorkouts.push({ index: i, mins: parseInt(tm[1]) * 60 + parseInt(tm[2]) });
            }
        }
        let activeW = null;
        for (let w of allWorkouts) { if (nowMins >= w.mins) activeW = w; }
        const grid = document.getElementById('main-grid');
        if (activeW) {
            let html = ""; let j = activeW.index + 1;
            while (j < rows.length) {
                if (!rows[j].c || !rows[j].c[0] || rows[j].c[0].v.toString().includes("אימון")) break;
                let ex = "";
                for (let k = 1; k < rows[j].c.length; k += 3) {
                    if (rows[j].c[k]?.v && rows[j].c[k].v !== "...") {
                        ex += `<div class="exercise-row"><div>${rows[j].c[k].v} <span class="weight">${rows[j].c[k+1]?.v || ''}</span></div><span class="reps">${rows[j].c[k+2]?.v || '-'}</span></div>`;
                    }
                }
                html += `<div class="card"><div class="trainee-name">${rows[j].c[0].v}</div>${ex}</div>`;
                j++;
            }
            grid.innerHTML = html;
        }
    }

    function fetchData() {
        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:onData&gid=0&tcb=${Date.now()}`;
        document.body.appendChild(script);
    }

    setInterval(fetchData, 3000); 
    setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'}); }, 1000);
    fetchData();
</script>
</body>
</html>
