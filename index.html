<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ALMA'S STUDIO - LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden; /* מונע גלילה לגמרי */
            background-color: #000;
            color: #fff;
            font-family: 'Assistant', sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            padding-top: 5vh; /* מרווח גמיש מלמעלה */
        }
        h1 {
            font-size: 3rem;
            margin: 0 0 2vh 0;
            text-align: center;
            font-weight: 800;
        }
        #workout-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
            padding: 0 20px 20px 20px;
            flex-grow: 1; /* לוקח את כל המקום שנשאר */
        }
        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 0; /* קריטי למניעת מתיחה */
        }
        .trainee-name {
            font-size: 1.8rem;
            font-weight: 700;
            border-bottom: 1px solid #444;
            margin-bottom: 8px;
            padding-bottom: 5px;
            text-align: center;
            color: #fff;
        }
        .exercise-list {
            list-style: none;
            padding: 0; margin: 0;
            text-align: right;
            overflow-y: auto; /* אם עדיין יש יותר מדי טקסט, תהיה גלילה פנימית קטנה בתוך הכרטיסייה */
            flex-grow: 1;
        }
        .exercise-item {
            font-size: 1.1rem; /* טקסט מעט קטן יותר כדי שייכנס הכל */
            margin-bottom: 4px;
            padding-right: 15px;
            position: relative;
            line-height: 1.2;
        }
        .exercise-item::before {
            content: "•";
            position: absolute;
            right: 0;
            color: #777;
        }
    </style>
</head>
<body>

    <h1>ALMA'S STUDIO</h1>
    <div id="workout-grid">טוען נתונים...</div>

    <script>
        const sheetId = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';
        const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        async function fetchData() {
            try {
                const res = await fetch(base);
                const text = await res.text();
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const grid = document.getElementById('workout-grid');
                grid.innerHTML = '';

                jsonData.table.rows.slice(0, 6).forEach((row) => {
                    const name = row.c[0] ? row.c[0].v : 'אימון';
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    let exercisesHtml = '';
                    for (let i = 1; i < row.c.length; i++) {
                        if (row.c[i] && row.c[i].v) {
                            // מנקה פורמטים מוזרים של תאריכים אם יש
                            let val = row.c[i].v;
                            if (typeof val === 'string' && val.includes('Date')) val = '';
                            if (val) exercisesHtml += `<div class="exercise-item">${val}</div>`;
                        }
                    }

                    card.innerHTML = `<div class="trainee-name">${name}</div><div class="exercise-list">${exercisesHtml}</div>`;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
            }
        }
        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
