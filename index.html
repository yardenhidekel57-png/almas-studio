<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMA'S STUDIO - LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* מבטל גלילה */
            background-color: #000;
            color: #fff;
            font-family: 'Assistant', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* מרווח עליון לבריחה מהפס של הדפדפן */
            padding-top: 85px; 
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0 0 20px 0;
            letter-spacing: 2px;
        }

        #workout-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 עמודות */
            grid-template-rows: repeat(2, 1fr);    /* 2 שורות */
            gap: 20px;
            width: 96%;
            height: calc(100vh - 180px); /* גובה מותאם למסך */
            padding-bottom: 20px;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .trainee-name {
            font-size: 2.2rem;
            font-weight: 700;
            border-bottom: 1px solid #444;
            margin-bottom: 15px;
            padding-bottom: 10px;
            text-align: center;
            color: #fff;
        }

        .exercise-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: right;
            overflow: hidden;
        }

        .exercise-item {
            font-size: 1.6rem;
            margin-bottom: 12px;
            padding-right: 25px;
            position: relative;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .exercise-item::before {
            content: "•";
            position: absolute;
            right: 0;
            color: #777;
        }

        #loading {
            font-size: 24px;
            margin-top: 100px;
        }
    </style>
</head>
<body>

    <h1>ALMA'S STUDIO</h1>
    <div id="loading">טוען נתונים מהגיליון...</div>
    <div id="workout-grid" style="display: none;"></div>

    <script>
        // ה-ID של הגיליון שלך
        const sheetId = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';
        const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        async function fetchData() {
            try {
                const res = await fetch(base);
                const text = await res.text();
                // ניקוי התגובה של גוגל
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                renderGrid(jsonData.table.rows);
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').innerText = "שגיאה בטעינה. וודאי שהגיליון ציבורי.";
            }
        }

        function renderGrid(rows) {
            const grid = document.getElementById('workout-grid');
            const loading = document.getElementById('loading');
            grid.innerHTML = '';

            // לוקח את 6 השורות הראשונות בלבד
            rows.slice(0, 6).forEach((row) => {
                const name = row.c[0] ? row.c[0].v : 'מתאמנת';
                
                const card = document.createElement('div');
                card.className = 'card';
                
                let exercisesHtml = '';
                // עובר על התרגילים (מתא עמודה 2 ואילך)
                for (let i = 1; i < row.c.length; i++) {
                    if (row.c[i] && row.c[i].v) {
                        exercisesHtml += `<li class="exercise-item">${row.c[i].v}</li>`;
                    }
                }

                card.innerHTML = `
                    <div class="trainee-name">${name}</div>
                    <ul class="exercise-list">${exercisesHtml}</ul>
                `;
                grid.appendChild(card);
            });

            loading.style.display = 'none';
            grid.style.display = 'grid';
        }

        // הפעלה ראשונית ועדכון כל דקה
        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
