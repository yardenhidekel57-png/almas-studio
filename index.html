<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alma Studio Live Control</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
        
        /* תצוגת שלט רחוק לאייפון */
        #remote-control { 
            display: none; height: 100vh; flex-direction: column; 
            justify-content: center; align-items: center; gap: 30px; background: #111;
        }
        .btn { 
            width: 80%; padding: 40px; font-size: 2.5rem; font-weight: 900; 
            border: none; border-radius: 20px; cursor: pointer; text-transform: uppercase;
        }
        .btn-start { background: #00ffcc; color: #000; }
        .btn-reset { background: #ff4444; color: #fff; }

        /* תצוגת פלאזמה */
        #plasma-view { display: flex; flex-direction: column; height: 100%; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; background: #111; border-radius: 20px; border-bottom: 4px solid #00ffcc; margin-bottom: 15px; }
        .studio-name { font-size: 2.5rem; color: #ffd700; font-weight: 900; }
        #live-clock { font-size: 2.2rem; color: #00ffcc; font-weight: bold; }
        .cards-grid { flex-grow: 1; display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); overflow-y: auto; padding-bottom: 150px; }
        .card { background: #161616; border-radius: 30px; padding: 30px; border: 3px solid #282828; }
        .trainee-name { font-size: 3rem; color: #ffd700; text-align: center; margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 10px; font-weight: 900; }
        .exercise-row { display: flex; justify-content: space-between; font-size: 2rem; padding: 8px 0; border-bottom: 1px solid #222; }
        
        /* פאנל טיימר בתחתית */
        .timer-panel { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(20,20,20,0.9); border-radius: 30px; padding: 20px; border-top: 4px solid #ff9f43; display: flex; justify-content: space-between; align-items: center; }
        #display-timer { font-size: 6rem; font-weight: 900; color: #ff9f43; }
        #status-dot { width: 20px; height: 20px; border-radius: 50%; background: #444; }
    </style>
</head>
<body onclick="document.getElementById('beep').load()">

    <div id="remote-control">
        <h1 style="color:#ffd700">ALMA REMOTE</h1>
        <button class="btn btn-start" onclick="triggerTimer()">הפעל טיימר (7 דק')</button>
        <button class="btn btn-reset" onclick="resetTimer()">איפוס / עצירה</button>
        <p id="remote-status" style="color: #555">מחובר לפלאזמה</p>
    </div>

    <div id="plasma-view">
        <div class="header">
            <div id="live-clock">00:00</div>
            <div class="studio-name">ALMA STUDIO</div>
            <div style="width:50px"></div>
        </div>
        <div id="main-grid" class="cards-grid"></div>
        <div class="timer-panel">
            <span style="color:#555; font-weight:bold">SYNC LIVE</span>
            <div id="display-timer">07:00</div>
            <div id="status-dot"></div>
        </div>
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk';
    const API_KEY = 'alma_studio_timer_2026'; // מזהה ייחודי עבורך
    const TIMER_SEC = 7 * 60;
    
    // זיהוי אם זה אייפון (שלט) או פלאזמה
    if (window.innerWidth < 600) {
        document.getElementById('remote-control').style.display = 'flex';
        document.getElementById('plasma-view').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // פונקציות לשלט רחוק
    async function triggerTimer() {
        const now = Math.floor(Date.now() / 1000);
        await fetch(`https://api.countapi.xyz/set/alma-studio/${API_KEY}?value=${now}`);
        document.getElementById('remote-status').innerText = "נשלח בהצלחה!";
        setTimeout(() => document.getElementById('remote-status').innerText = "מחובר לפלאזמה", 2000);
    }

    async function resetTimer() {
        await fetch(`https://api.countapi.xyz/set/alma-studio/${API_KEY}?value=0`);
    }

    // פונקציות לפלאזמה
    let lastStartTime = 0;
    async function syncTimer() {
        try {
            const res = await fetch(`https://api.countapi.xyz/get/alma-studio/${API_KEY}`);
            const data = await res.json();
            const remoteTime = data.value;

            if (remoteTime > 0) {
                const now = Math.floor(Date.now() / 1000);
                const elapsed = now - remoteTime;
                const remaining = Math.max(0, TIMER_SEC - elapsed);
                
                const m = Math.floor(remaining / 60), s = remaining % 60;
                document.getElementById('display-timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                document.getElementById('status-dot').style.background = "#ff9f43";
                
                if (remaining === 0 && lastStartTime !== remoteTime) {
                    document.getElementById('beep').play();
                }
            } else {
                document.getElementById('display-timer').innerText = "07:00";
                document.getElementById('status-dot').style.background = "#444";
            }
            lastStartTime = remoteTime;
        } catch (e) { console.log("Sync error"); }
    }

    // משיכת נתוני מתאמנות מגוגל (רק הכרטיסיות)
    function onData(data) {
        if (!data || !data.table) return;
        const rows = data.table.rows;
        const now = new Date();
        const nowMins = now.getHours() * 60 + now.getMinutes();
        
        let allWorkouts = [];
        for (let i = 0; i < rows.length; i++) {
            const firstCell = rows[i].c && rows[i].c[0] ? rows[i].c[0].v.toString().trim() : "";
            if (firstCell.startsWith("אימון")) {
                const tm = firstCell.match(/(\d{1,2}):(\d{2})/);
                if (tm) allWorkouts.push({ index: i, mins: parseInt(tm[1]) * 60 + parseInt(tm[2]) });
            }
        }
        
        let activeW = null;
        for (let w of allWorkouts) { if (nowMins >= w.mins) activeW = w; }
        
        const grid = document.getElementById('main-grid');
        if (activeW) {
            let html = ""; let j = activeW.index + 1;
            while (j < rows.length) {
                if (!rows[j].c || !rows[j].c[0] || rows[j].c[0].v.toString().includes("אימון")) break;
                let ex = "";
                for (let k = 1; k < rows[j].c.length; k += 3) {
                    if (rows[j].c[k]?.v && rows[j].c[k].v !== "...") {
                        ex += `<div class="exercise-row"><div>${rows[j].c[k].v} <span style="color:#ff9f43">${rows[j].c[k+1]?.v || ''}</span></div><span style="color:#00ffcc; border:1px solid; padding:2px 10px; border-radius:10px">${rows[j].c[k+2]?.v || '-'}</span></div>`;
                    }
                }
                html += `<div class="card"><div class="trainee-name">${rows[j].c[0].v}</div>${ex}</div>`;
                j++;
            }
            grid.innerHTML = html;
        }
    }

    function fetchData() {
        const script = document.createElement('script');
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:onData&gid=0&tcb=${Date.now()}`;
        document.body.appendChild(script);
    }

    // הפעלה
    setInterval(fetchData, 10000); // מתאמנות מתעדכנות כל 10 שניות
    setInterval(syncTimer, 2000);  // טיימר מסתנכרן כל 2 שניות
    setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'}); }, 1000);
    fetchData();
    syncTimer();
</script>
</body>
</html>
