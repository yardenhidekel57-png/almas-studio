<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma's Studio - Adaptive Display</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background-color: #050505; color: white;
            font-family: system-ui, sans-serif;
        }
        body { display: flex; flex-direction: column; padding: 1vh; }

        .header { 
            height: 8vh; background: #111; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 3vw; border-bottom: 0.4vh solid #00ffcc; border-radius: 1.5vh;
            margin-bottom: 1vh; flex-shrink: 0;
        }
        .logo-main { font-size: 3.5vh; color: #ffd700; font-weight: 900; }
        #time { font-size: 4vh; color: #00ffcc; font-weight: 900; }

        #container {
            height: 88vh;
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
        }

        .row {
            display: flex;
            height: 43vh; /* גובה חצי מסך פחות כותרת */
            gap: 1.5vw;
            justify-content: center;
        }

        .card { 
            background: #161616; border: 0.2vh solid #333; border-radius: 2vh; 
            display: flex; flex-direction: column; flex: 1;
            padding: 1.5vh; overflow: hidden;
            max-width: 31vw;
        }

        .name { 
            font-size: 3.2vh; color: #ffd700; text-align: center; 
            border-bottom: 0.2vh solid #444; margin-bottom: 1vh; font-weight: 900;
            flex-shrink: 0;
        }

        /* רשימת תרגילים גמישה - Flex 1 גורם להם להתחלק בשטח שנותר */
        .ex-list { 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* מותח את התרגילים לכל גובה הכרטיסייה */
            min-height: 0;
        }

        .ex-row { 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #222;
            flex: 1; /* כל שורה מקבלת חלק שווה מהגובה */
            min-height: 0;
        }

        /* טקסט תרגיל שיקטן אם יש הרבה שורות */
        .ex-text {
            font-size: clamp(1.2vh, 2.2vh, 3vh); 
            font-weight: 500;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .reps { 
            color: #00ffcc; font-weight: 900; background: rgba(0, 255, 204, 0.1); 
            padding: 0.2vh 1vw; border-radius: 0.8vh; border: 0.15vh solid #00ffcc;
            font-size: clamp(1.2vh, 2vh, 2.8vh); 
            min-width: 6vw; text-align: center;
        }
        
        .weight { color: #ff9f43; font-weight: bold; font-size: 0.8em; margin-right: 0.5vw; }
    </style>
</head>
<body>

    <div class="header">
        <div id="date" style="font-size: 2vh; color: #888;">--/--</div>
        <div class="logo-main">Alma's STUDIO</div>
        <div id="time">00:00:00</div>
    </div>

    <div id="container">
        <div class="row" id="row-1"></div>
        <div class="row" id="row-2"></div>
    </div>

    <script>
        const SHEET_ID = '18DFppHukNFORCDMr4CAyZ-LlEOgBKVDbliLN4-vpFCk'; 

        function handleData(data) {
            if (!data || !data.table) return;
            const rows = data.table.rows;
            const row1 = document.getElementById('row-1');
            const row2 = document.getElementById('row-2');
            row1.innerHTML = ''; row2.innerHTML = '';
            
            let count = 0;
            for (let i = 0; i < rows.length; i++) {
                const r = rows[i].c;
                if (!r || !r[0] || !r[0].v) continue;
                const name = r[0].v.toString().trim();
                if (name === "" || name.includes("אימון") || name === "מתאמנת") continue;

                let html = `<div class="card"><div class="name">${name}</div><div class="ex-list">`;
                
                // ספירת תרגילים כדי לדעת כמה לצופף
                let exercises = [];
                for (let j = 1; j < r.length; j += 3) {
                    const ex = r[j] ? r[j].v : '';
                    if (ex && ex !== "" && ex !== "...") {
                        exercises.push({
                            title: ex,
                            w: (r[j+1] && r[j+1].v) ? r[j+1].v : '',
                            reps: (r[j+2] && r[j+2].v) ? r[j+2].v : ''
                        });
                    }
                }

                // יצירת השורות - גודל הפונט יושפע אוטומטית מכמות האלמנטים בתוך ה-Flex
                exercises.forEach(item => {
                    html += `<div class="ex-row">
                                <div class="ex-text"><span>${item.title}</span><span class="weight">${item.w}</span></div>
                                <div class="reps">${item.reps}</div>
                             </div>`;
                });

                html += `</div></div>`;
                
                if (count < 3) row1.innerHTML += html;
                else if (count < 6) row2.innerHTML += html;
                count++;
            }
        }

        function refresh() {
            const s = document.createElement('script');
            s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:handleData&gid=0&tcb=${Date.now()}`;
            document.head.appendChild(s);
            s.onload = () => s.remove();
        }

        setInterval(refresh, 10000);
        setInterval(() => {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString('he-IL');
            document.getElementById('date').innerText = n.toLocaleDateString('he-IL', {day:'numeric', month:'numeric'});
        }, 1000);
        refresh();
    </script>
</body>
</html>
